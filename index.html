<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v5.48.11 (Modular)</title>
    <style>
        body { margin: 0; background-color: #ffffff; color: #111; overflow: hidden; display: flex; font-family: monospace; touch-action: none; user-select: none; }
        #panel { width: 100px; height: 100vh; background: #e0e0e0; border-right: 1px solid #ccc; display: flex; flex-direction: column; align-items: center; padding-top: 15px; z-index: 100; box-sizing: border-box; justify-content: space-between; padding-bottom: 15px;}
        .top-btns { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 10px; }
        .nav-row { display: flex; gap: 4px; width: 85%; justify-content: center; }
        .util-btn { flex: 1; height: 32px; cursor: pointer; background: #fdfdfd; border: 1px solid #bbb; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
        .save-btn { background: #444; color: white; border: none; font-size: 10px; }
        .load-btn { background: #888; color: white; border: none; font-size: 10px; }
        .egg-btn { background: #ff69b4; border-radius: 50%; width: 45px; height: 55px; cursor: pointer; border: 2px solid #fff; }
        #size-info { width: 90%; padding: 10px 5px; background: #f8f8f8; border: 1px solid #bbb; border-radius: 5px; font-size: 11px; color: #333; box-sizing: border-box;}
        #canvas-container { flex-grow: 1; position: relative; }
        #v-tag { position: absolute; bottom: 15px; right: 20px; color: #444; font-size: 12px; font-weight: bold; pointer-events: none; }
        #palette { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.95); padding: 12px; border-radius: 12px; display: none; grid-template-columns: repeat(6, 1fr); gap: 6px; border: 1px solid #ccc; z-index: 200; }
        .color-dot { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(0,0,0,0.15); }
        #select-box { border: 2px dashed #ff69b4; background-color: rgba(255, 105, 180, 0.2); position: absolute; pointer-events: none; display: none; z-index: 300; }
    </style>
</head>
<body>

<div id="panel">
    <div class="top-btns">
        <div class="nav-row">
            <button id="undo-btn" class="util-btn" onclick="executeUndo()">⟲</button>
            <button id="redo-btn" class="util-btn" onclick="executeRedo()">⟳</button>
        </div>
        <div class="nav-row">
            <button class="util-btn save-btn" onclick="saveProject()">SAVE</button>
            <button class="util-btn load-btn" onclick="triggerFileSelect()">LOAD</button>
        </div>
        <input type="file" id="file-input" style="display:none;" accept=".json" onchange="handleFileSelect(event)">
        <div id="egg-spawn-btn" class="egg-btn" onclick="togglePlacementMode()"></div>
        <div id="size-info">
            <div class="val-row"><span>W:</span><span id="info-w">0.0</span></div>
            <div class="val-row"><span>H:</span><span id="info-h">0.0</span></div>
            <div class="val-row"><span>D:</span><span id="info-d">0.0</span></div>
        </div>
    </div>
</div>

<div id="canvas-container">
    <div id="v-tag">v5.48.11 (Modular)</div>
    <div id="palette">
        <script>
            const colors = ['#ffffff','#f0f0f0','#d0d0d0','#808080','#404040','#000000','#ff0000','#dc3545','#ff6b6b','#ff8787','#ff69b4','#fcc2d7','#fd7e14','#f76707','#ff922b','#ffd43b','#fff3bf','#fab005','#28a745','#40c057','#8ce99a','#12b886','#087f5b','#b2f2bb','#007bff','#228be6','#74c0fc','#15aabf','#4dabf7','#a5d8ff','#6f42c1','#7950f2','#be4bdb','#eebefa','#85501d','#d7b49e'];
            colors.forEach(c => document.write(`<div class="color-dot" style="background:${c};" onclick="updateColor('${c}')"></div>`));
        </script>
    </div>
    <div id="select-box"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script src="engine.js"></script>
<script src="ui_logic.js"></script>

</body>
</html>
