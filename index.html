<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet Engine v5.48.9 (Full Version)</title>
    <style>
        body { margin: 0; background-color: #ffffff; color: #111; overflow: hidden; display: flex; font-family: monospace; touch-action: none; user-select: none; }
        #panel { width: 100px; height: 100vh; background: #e0e0e0; border-right: 1px solid #ccc; display: flex; flex-direction: column; align-items: center; padding-top: 15px; z-index: 100; box-sizing: border-box; justify-content: space-between; padding-bottom: 15px;}
        .top-btns { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 10px; }
        .nav-row { display: flex; gap: 4px; width: 85%; justify-content: center; }
        .util-btn { flex: 1; height: 32px; cursor: pointer; background: #fdfdfd; border: 1px solid #bbb; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
        .egg-btn { background: #ff69b4; border-radius: 50%; width: 45px; height: 55px; cursor: pointer; border: 2px solid #fff; }
        .egg-btn.active { background: #28a745; box-shadow: 0 0 15px rgba(40,167,69,0.5); }
        #size-info { width: 90%; padding: 10px 5px; background: #f8f8f8; border: 1px solid #bbb; border-radius: 5px; font-size: 11px; color: #333; box-sizing: border-box;}
        .info-label { font-weight: bold; color: #ff69b4; margin-bottom: 5px; border-bottom: 1px solid #ddd; padding-bottom: 2px; text-align: center; }
        .val-row { display: flex; justify-content: space-between; margin-bottom: 4px; padding: 0 3px; }
        
        .menu-group { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .pattern-btn { width: 85px; height: 35px; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 10px; }
        .p2d-btn { width: 85px; height: 35px; background: #6f42c1; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 10px; }
        .learn-btn { width: 85px; height: 30px; background: #dc3545; color: white; border: 2px solid #fff; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 9px; }

        #canvas-container { flex-grow: 1; position: relative; }
        #v-tag { position: absolute; bottom: 15px; right: 20px; color: #444; font-size: 12px; font-weight: bold; pointer-events: none; }
        #palette { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.95); padding: 12px; border-radius: 12px; display: none; grid-template-columns: repeat(6, 1fr); gap: 6px; border: 1px solid #ccc; z-index: 200; }
        .color-dot { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        #select-box { border: 1px dashed #ff69b4; background: rgba(255,105,180,0.1); position: absolute; pointer-events: none; display: none; z-index: 300; }
    </style>
</head>
<body>

<div id="panel">
    <div class="top-btns">
        <div class="nav-row">
            <button class="util-btn" onclick="executeUndo()">⟲</button>
            <button class="util-btn" onclick="executeRedo()">⟳</button>
        </div>
        <div class="nav-row">
            <button class="util-btn" style="font-size:9px;" onclick="saveProject()">SAVE</button>
            <button class="util-btn" style="font-size:9px;" onclick="triggerLoad()">LOAD</button>
        </div>
        <input type="file" id="file-input" style="display:none;" onchange="handleFileSelect(event)">
        <div id="egg-spawn-btn" class="egg-btn" onclick="togglePlacementMode()"></div>
        <div id="size-info">
            <div class="info-label">SIZE (cm)</div>
            <div class="val-row"><span>W:</span><span id="info-w">0.0</span></div>
            <div class="val-row"><span>H:</span><span id="info-h">0.0</span></div>
            <div class="val-row"><span>D:</span><span id="info-d">0.0</span></div>
        </div>
    </div>

    <div class="menu-group">
        <button class="pattern-btn" onclick="alert('v5.47.0 Pattern Logic')">PATTERN</button>
        <button class="p2d-btn" onclick="alert('P2D logic will be added here')">P2D</button>
        <button class="learn-btn" onclick="alert('Deep Learn logic will be added here')">DEEP LEARN</button>
    </div>
</div>

<div id="canvas-container">
    <div id="v-tag">Build-A-Crochet v5.48.9</div>
    <div id="palette"></div>
    <div id="select-box"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    // --- [ v5.47.0 원본 물리/디자인 엔진 복구 ] ---
    let scene, camera, renderer, controls, currentEgg, ghostEgg;
    let isPlacementMode = false, isDragging = false, mouseButton;
    let dragTarget = null, handles = [], history = [], currentSelection = [];
    let boxStart = new THREE.Vector2(), isBoxSelecting = false;
    
    const CM_RATIO = 0.5, BASE_H = 20, BASE_R = 7;

    function init() {
        scene = new THREE.Scene(); scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 100) / window.innerHeight, 0.1, 1000);
        camera.position.set(60, 50, 80);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 100, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        scene.add(new THREE.GridHelper(100, 20, 0xcccccc, 0xeeeeee));
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: null };

        createGhost(); createGizmos(); initPalette();
        
        window.addEventListener('pointerdown', onDown);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        window.addEventListener('keydown', (e) => { if(e.key==='Delete') deleteSelected(); });
        
        animate(); captureState();
    }

    function createEgg(color, isGhost = false) {
        const points = [];
        for (let i = 0; i <= 20; i++) {
            const t = i / 20, y = t * BASE_H, r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((y - 10) / 10, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geo = new THREE.LatheGeometry(points, 32); geo.translate(0, -10, 0);
        geo.userData.origPos = geo.attributes.position.clone();
        const mat = new THREE.MeshLambertMaterial({ color, transparent: isGhost, opacity: isGhost ? 0.4 : 1 });
        const egg = new THREE.Mesh(geo, mat);
        egg.userData.isEgg = !isGhost;
        egg.userData.data = { scale: new THREE.Vector3(1,1,1), offsets: Array(6).fill(0).map(()=>new THREE.Vector3()) };
        return egg;
    }

    function updateMesh(egg) {
        const pos = egg.geometry.attributes.position, orig = egg.geometry.userData.origPos;
        const { scale, offsets } = egg.userData.data;
        const ctrls = [new THREE.Vector3(0,10,0), new THREE.Vector3(0,-10,0), new THREE.Vector3(-7,0,0), new THREE.Vector3(7,0,0), new THREE.Vector3(0,0,7), new THREE.Vector3(0,0,-7)];
        for (let i = 0; i < orig.count; i++) {
            const v = new THREE.Vector3(orig.getX(i), orig.getY(i), orig.getZ(i)), sV = v.clone().multiply(scale);
            let tw = 0; const sOff = new THREE.Vector3();
            ctrls.forEach((c, j) => {
                const w = 1 / Math.pow(v.distanceTo(c) + 1, 3.5);
                tw += w; sOff.add(offsets[j].clone().multiplyScalar(w));
            });
            pos.setXYZ(i, sV.x + (sOff.x/tw), sV.y + (sOff.y/tw), sV.z + (sOff.z/tw));
        }
        pos.needsUpdate = true;
    }

    function onDown(e) {
        if(e.target.tagName !== 'CANVAS') return;
        const rect = renderer.domElement.getBoundingClientRect();
        const m = new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1, -((e.clientY-rect.top)/rect.height)*2+1);
        const ray = new THREE.Raycaster(); ray.setFromCamera(m, camera);

        if(isPlacementMode) {
            const h = ray.intersectObject(scene.children.find(o=>o.type==="GridHelper"));
            if(h.length>0) spawnEgg(h[0].point); return;
        }

        const gh = ray.intersectObjects(handles);
        if(gh.length>0) {
            dragTarget = gh[0].object; isDragging=true; mouseButton=e.button; controls.enabled=false;
            return;
        }

        const eh = ray.intersectObjects(scene.children.filter(o=>o.userData.isEgg));
        if(eh.length>0) {
            updateSelection([eh[0].object]);
            dragTarget=eh[0].object; isDragging=true; mouseButton=e.button; controls.enabled=false;
        } else {
            isBoxSelecting = true; boxStart.set(e.clientX, e.clientY);
            document.getElementById('select-box').style.display = 'block';
            updateSelection([]);
        }
    }

    function onMove(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const m = new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1, -((e.clientY-rect.top)/rect.height)*2+1);
        const ray = new THREE.Raycaster(); ray.setFromCamera(m, camera);

        if(isPlacementMode) {
            const h = ray.intersectObject(scene.children.find(o=>o.type==="GridHelper"));
            if(h.length>0) { ghostEgg.visible=true; ghostEgg.position.copy(h[0].point).y+=10.01; }
            else ghostEgg.visible=false;
        }

        if(isBoxSelecting) {
            const box = document.getElementById('select-box');
            box.style.left = Math.min(e.clientX, boxStart.x) + 'px';
            box.style.top = Math.min(e.clientY, boxStart.y) + 'px';
            box.style.width = Math.abs(e.clientX - boxStart.x) + 'px';
            box.style.height = Math.abs(e.clientY - boxStart.y) + 'px';
            return;
        }

        if(!isDragging || !dragTarget || !currentEgg) return;
        const pl = new THREE.Plane(camera.getWorldDirection(new THREE.Vector3()).negate(), -currentEgg.position.dot(camera.getWorldDirection(new THREE.Vector3()).negate()));
        let inter = new THREE.Vector3();
        if(ray.ray.intersectPlane(pl, inter)) {
            if(dragTarget.userData.isHandle) {
                const id = dragTarget.userData.id;
                if(mouseButton === 2) { // 우클릭 한 방향 스케일
                    const d = (id<2)?'y':(id<4?'x':'z');
                    currentEgg.userData.data.scale[d] = inter.distanceTo(currentEgg.position) / (id<2?10:7);
                } else if(e.ctrlKey) { // Ctrl 오프셋 조정
                    currentEgg.userData.data.offsets[id].copy(inter.sub(currentEgg.position).applyQuaternion(currentEgg.quaternion.clone().invert()));
                }
                updateMesh(currentEgg);
            } else if(dragTarget.userData.isEgg) currentEgg.position.copy(inter);
            updateRealSize();
        }
    }

    function onUp() { isBoxSelecting = false; document.getElementById('select-box').style.display='none'; if(isDragging) captureState(); isDragging=false; dragTarget=null; controls.enabled=true; }

    function spawnEgg(p) { const eg=createEgg(0xff69b4); eg.position.copy(p).y+=10; scene.add(eg); updateSelection([eg]); captureState(); isPlacementMode=false; document.getElementById('egg-spawn-btn').classList.remove('active'); ghostEgg.visible=false; }
    function updateSelection(list) { currentSelection=list; currentEgg=list[0]||null; handles.forEach(h=>h.visible=!!currentEgg); document.getElementById('palette').style.display=currentEgg?'grid':'none'; }
    function deleteSelected() { currentSelection.forEach(o=>scene.remove(o)); updateSelection([]); captureState(); }
    function captureState() { history.push(JSON.stringify(scene.children.filter(o=>o.userData.isEgg).map(e=>({pos:e.position, scale:e.userData.data.scale, offsets:e.userData.data.offsets, col:e.material.color.getHex()})))); if(history.length>30) history.shift(); }
    function executeUndo() { if(history.length>1) { applyState(history[history.length-2]); history.pop(); } }

    function applyState(str) {
        const data=JSON.parse(str); scene.children.filter(o=>o.userData.isEgg).forEach(e=>scene.remove(e));
        data.forEach(d=>{ const e=createEgg(new THREE.Color(d.col)); e.position.copy(d.pos); e.userData.data.scale.copy(d.scale); e.userData.data.offsets=d.offsets.map(v=>new THREE.Vector3(v.x,v.y,v.z)); updateMesh(e); scene.add(e); });
    }

    function createGhost() { ghostEgg=createEgg(0x28a745,true); ghostEgg.visible=false; scene.add(ghostEgg); }
    function togglePlacementMode() { isPlacementMode=!isPlacementMode; document.getElementById('egg-spawn-btn').classList.toggle('active'); }
    function createGizmos() { for(let i=0;i<6;i++){ const h=new THREE.Mesh(new THREE.SphereGeometry(1.5), new THREE.MeshBasicMaterial({color:0xffcc00})); h.userData={isHandle:true, id:i}; h.visible=false; handles.push(h); scene.add(h); } }
    function updateRealSize() { if(!currentEgg) return; const b=new THREE.Box3().setFromObject(currentEgg); const s=b.getSize(new THREE.Vector3()); document.getElementById('info-w').innerText=(s.x*CM_RATIO).toFixed(1); document.getElementById('info-h').innerText=(s.y*CM_RATIO).toFixed(1); }
    function initPalette() { const cols=['#ffffff','#d0d0d0','#808080','#000000','#ff0000','#ff69b4','#ffd43b','#28a745','#007bff','#6f42c1']; cols.forEach(c=>{ const d=document.createElement('div'); d.className='color-dot'; d.style.background=c; d.onclick=()=>{if(currentEgg){currentEgg.material.color.set(c); captureState();}}; document.getElementById('palette').appendChild(d); }); }
    
    function animate() {
        requestAnimationFrame(animate);
        if(currentEgg) {
            const {scale, offsets} = currentEgg.userData.data;
            const ctrls = [new THREE.Vector3(0,10,0), new THREE.Vector3(0,-10,0), new THREE.Vector3(-7,0,0), new THREE.Vector3(7,0,0), new THREE.Vector3(0,0,7), new THREE.Vector3(0,0,-7)];
            handles.forEach((h, i) => { const lp = ctrls[i].clone().multiply(scale).add(offsets[i]).add(ctrls[i].clone().normalize().multiplyScalar(5)); h.position.copy(currentEgg.position).add(lp.applyQuaternion(currentEgg.quaternion)); });
        }
        renderer.render(scene, camera);
    }

    window.saveProject = () => { const blob = new Blob([history[history.length-1]], {type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='crochet_v5_48.json'; a.click(); };
    window.triggerLoad = () => document.getElementById('file-input').click();
    window.handleFileSelect = (e) => { const reader=new FileReader(); reader.onload=(ev)=>{ applyState(ev.target.result); captureState(); }; reader.readAsText(e.target.files[0]); };

    window.onload = init;
</script>
</body>
</html>
