<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v5.6.1 (Sync Fixed)</title>
    <style>
        body { margin: 0; background: #222; color: white; overflow: hidden; display: flex; touch-action: none; font-family: sans-serif; }
        #panel { width: 80px; background: #333; display: flex; flex-direction: column; align-items: center; padding: 10px; z-index: 10; border-right: 1px solid #444; }
        .btn { width: 50px; height: 50px; background: #ff69b4; border-radius: 10px; cursor: pointer; border: 2px solid #fff; margin-bottom: 5px;}
        #container { flex-grow: 1; height: 100vh; position: relative; }
        #status { position: absolute; top: 10px; left: 10px; color: #0f0; font-family: monospace; font-size: 11px; pointer-events: none; z-index: 20; }
    </style>
</head>
<body>
    <div id="panel">
        <button class="btn" onclick="spawn()"></button>
        <p style="font-size: 10px; margin: 0 0 15px 0;">ADD EGG</p>
    </div>
    <div id="container">
        <div id="status">Engine Ready v5.6.1</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, egg = null;
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        
        // Handles
        let topH, bottomH, moveH, rightH;
        let dragTarget = null;
        let prevX = 0, prevY = 0;
        
        // Base Dimensions
        const BASE_H = 20; // 기본 높이
        const BASE_R = 7;  // 기본 반지름 (두께)

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 80) / window.innerHeight, 0.1, 1000);
            camera.position.set(50, 50, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 80, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            scene.add(new THREE.GridHelper(100, 20, 0x444444, 0x222222));
            scene.add(new THREE.AmbientLight(0xffffff, 1));
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            
            window.addEventListener('pointerdown', onDown);
            window.addEventListener('pointermove', onMove);
            window.addEventListener('pointerup', onUp);
            
            animate();
        }

        window.spawn = function() {
            if (egg) return;
            
            // 핵심 수정 1: Geometry 생성 자체를 정중앙(0,0,0)을 기준으로 변경
            const points = [];
            for (let i = 0; i <= 20; i++) {
                const t = i / 20;
                const y = t * BASE_H;
                const r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((y - (BASE_H/2)) / (BASE_H/2), 2)));
                points.push(new THREE.Vector2(Math.max(0.1, r), y));
            }
            const geo = new THREE.LatheGeometry(points, 32);
            // v5.6.0에 있던 geo.translate(BASE_R, 0, 0)을 삭제 -> Geometry 중심이 0에 위치함
            
            const mat = new THREE.MeshPhongMaterial({ color: 0xff69b4, wireframe: true, transparent: true, opacity: 0.8 });
            egg = new THREE.Mesh(geo, mat);
            // 에그 초기 위치를 그리드 0,0,0에 맞춤
            egg.position.set(0, 0, 0);
            scene.add(egg);

            const hGeo = new THREE.SphereGeometry(1.2, 16, 16);
            
            topH = new THREE.Mesh(hGeo, new THREE.MeshBasicMaterial({ color: 0x007bff })); 
            bottomH = new THREE.Mesh(hGeo, new THREE.MeshBasicMaterial({ color: 0x00d4ff })); 
            moveH = new THREE.Mesh(hGeo, new THREE.MeshBasicMaterial({ color: 0x28a745 })); 
            rightH = new THREE.Mesh(hGeo, new THREE.MeshBasicMaterial({ color: 0x0056b3 })); 
            
            topH.visible = bottomH.visible = moveH.visible = rightH.visible = false;
            scene.add(topH); scene.add(bottomH); scene.add(moveH); scene.add(rightH);
            
            document.getElementById('status').innerText = "Egg Ready. Click the Egg!";
            console.log("Spawned");
        }

        function onDown(e) {
            updateMouseCoords(e);
            raycaster.setFromCamera(mouse, camera);

            if (egg) {
                const targets = [topH, bottomH, moveH, rightH, egg];
                const hits = raycaster.intersectObjects(targets.filter(t => t && (t.visible || t === egg)));
                
                if (hits.length > 0) {
                    const obj = hits[0].object;
                    if (obj === egg) {
                        topH.visible = bottomH.visible = moveH.visible = rightH.visible = true;
                    } else {
                        dragTarget = obj;
                        controls.enabled = false;
                        prevX = e.clientX;
                        prevY = e.clientY;
                    }
                } else {
                    topH.visible = bottomH.visible = moveH.visible = rightH.visible = false;
                }
            }
        }

        function onMove(e) {
            if (!dragTarget || !egg) return;
            
            const dx = (e.clientX - prevX); // X축 이동량
            const dy = (prevY - e.clientY); // Y축 이동량
            prevX = e.clientX;
            prevY = e.clientY;

            if (dragTarget === moveH) {
                egg.position.y += dy * 0.1;
            } else if (dragTarget === topH) {
                egg.scale.y = Math.max(0.1, egg.scale.y + dy * 0.01);
            } else if (dragTarget === bottomH) {
                const oldS = egg.scale.y;
                const newS = Math.max(0.1, oldS - dy * 0.01);
                const diff = newS - oldS;
                egg.scale.y = newS;
                egg.position.y -= diff * BASE_H; 
            } else if (dragTarget === rightH) {
                // 가로 스케일 (오른쪽 중간 핸들)
                const oldS = egg.scale.x;
                // 오른쪽으로 드래그하면 커지고, 왼쪽으로 드래그하면 작아짐
                const newS = Math.max(0.1, oldS + dx * 0.01);
                const diff = newS - oldS;
                
                egg.scale.x = newS;
                // 핵심 수정 2: 에그의 중심이 X=0이므로 보정식도 중심에서 오른쪽으로 늘어나도록 수정
                egg.position.x += diff * (BASE_R / 2); 
            }
        }

        function onUp() {
            dragTarget = null;
            controls.enabled = true;
        }

        function updateMouseCoords(e) {
