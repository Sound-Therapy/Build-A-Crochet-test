<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v5.7.2</title>
    <style>
        body { margin: 0; background-color: #111; color: #0f0; overflow: hidden; display: flex; font-family: monospace; touch-action: none; }
        #panel { width: 80px; height: 100vh; background: #222; border-right: 1px solid #444; display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100; }
        .btn { width: 50px; height: 50px; background: #ff69b4; border: 2px solid #fff; border-radius: 10px; cursor: pointer; }
        #canvas-container { flex-grow: 1; position: relative; background: #000; }
        #v-tag { position: absolute; bottom: 15px; right: 20px; color: #555; font-size: 12px; font-weight: bold; z-index: 200; }
    </style>
</head>
<body>

<div id="panel">
    <button class="btn" onclick="handleSpawn()"></button>
    <div style="font-size: 10px; margin-top: 5px; color: #ccc;">ADD EGG</div>
</div>

<div id="canvas-container">
    <div id="v-tag">Build-A-Crochet Engine v5.7.2</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, egg;
    let moveH, rotX_H, rotY_H, rotZ_H;
    let dragTarget = null;
    let plane = new THREE.Plane();
    let planeIntersect = new THREE.Vector3();
    let dragStartOffset = new THREE.Vector3();
    let startRotation = new THREE.Quaternion();
    let startMouseAngle = 0;

    const BASE_H = 20, BASE_R = 7;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 80) / window.innerHeight, 0.1, 1000);
        camera.position.set(60, 50, 80);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 80, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(100, 20, 0x444444, 0x222222));
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        window.addEventListener('pointerdown', onDown);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        animate();
    }

    function createRing(axis, color) {
        const geometry = new THREE.TorusGeometry(15, 0.4, 16, 64, Math.PI);
        const material = new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide });
        const ring = new THREE.Mesh(geometry, material);
        if (axis === 'x') ring.rotation.y = Math.PI / 2;
        if (axis === 'y') ring.rotation.x = Math.PI / 2;
        ring.visible = false;
        scene.add(ring);
        return ring;
    }

    window.handleSpawn = function() {
        if (egg) return;
        const points = [];
        for (let i = 0; i <= 20; i++) {
            const t = i / 20;
            const y = (t - 0.5) * BASE_H;
            const r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow(y / (BASE_H/2), 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geo = new THREE.LatheGeometry(points, 32);
        const mat = new THREE.MeshPhongMaterial({ color: 0xff69b4, wireframe: true, transparent: true, opacity: 0.7 });
        egg = new THREE.Mesh(geo, mat);
        scene.add(egg);

        const hGeo = new THREE.SphereGeometry(1.5, 16, 16);
        moveH = new THREE.Mesh(hGeo, new THREE.MeshBasicMaterial({ color: 0x28a745 }));
        moveH.visible = false;
        scene.add(moveH);

        rotX_H = createRing('x', 0xff0000); // Red: X-axis
        rotY_H = createRing('y', 0x00ff00); // Green: Y-axis
        rotZ_H = createRing('z', 0x0000ff); // Blue: Z-axis
    };

    function onDown(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);

        const hits = raycaster.intersectObjects([egg, moveH, rotX_H, rotY_H, rotZ_H].filter(o => o && (o.visible || o === egg)));
        
        if (hits.length > 0) {
            const obj = hits[0].object;
            if (obj === egg) {
                [moveH, rotX_H, rotY_H, rotZ_H].forEach(h => h.visible = true);
            } else {
                dragTarget = obj;
                controls.enabled = false;
                startRotation.copy(egg.quaternion);
                
                const camDir = new THREE.Vector3();
                camera.getWorldDirection(camDir);
                plane.setFromNormalAndCoplanarPoint(camDir, dragTarget.position);
                
                raycaster.ray.intersectPlane(plane, planeIntersect);
                dragStartOffset.copy(planeIntersect).sub(dragTarget.position);
                
                // 회전 시작 각도 기록 (단순 스크린 좌표 기준)
                startMouseAngle = Math.atan2(e.clientY - window.innerHeight/2, e.clientX - window.innerWidth/2);
            }
        } else {
            [moveH, rotX_H, rotY_H, rotZ_H].forEach(h => h.visible = false);
        }
    }

    function onMove(e) {
        if (!dragTarget || !egg) return;
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);

        if (raycaster.ray.intersectPlane(plane, planeIntersect)) {
            const pos = planeIntersect.sub(dragStartOffset);
            
            if (dragTarget === moveH) {
                egg.position.copy(pos.clone().sub(new THREE.Vector3(0, BASE_H/2 + 4, 0)));
            } else {
                // 회전 로직: 마우스의 회전량을 각도로 변환
                const currentAngle = Math.atan2(e.clientY - window.innerHeight/2, e.clientX - window.innerWidth/2);
                const deltaAngle = currentAngle - startMouseAngle;
                
                const axis = new THREE.Vector3();
                if (dragTarget === rotX_H) axis.set(1, 0, 0);
                else if (dragTarget === rotY_H) axis.set(0, 1, 0);
                else if (dragTarget === rotZ_H) axis.set(0, 0, 1);
                
                const q = new THREE.Quaternion().setFromAxisAngle(axis, deltaAngle);
                egg.quaternion.multiplyQuaternions(q, startRotation);
            }
        }
    }

    function onUp() { dragTarget = null; controls.enabled = true; }

    function animate() {
        requestAnimationFrame(animate);
        if (egg && moveH) {
            const center = egg.position.clone();
            moveH.position.copy(center).add(new THREE.Vector3(0, BASE_H/2 + 4, 0));
            [rotX_H, rotY_H, rotZ_H].forEach(r => r.position.copy(center));
        }
        renderer.render(scene, camera);
        controls.update();
    }
    window.onload = init;
</script>
</body>
</html>
