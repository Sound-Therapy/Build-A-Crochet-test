<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Recovery Mode v5.5.5</title>
    <style>
        body { margin: 0; background: #222; color: white; overflow: hidden; display: flex; }
        #panel { width: 80px; background: #333; display: flex; flex-direction: column; align-items: center; padding: 10px; z-index: 10; }
        .btn { width: 50px; height: 50px; background: #ff69b4; border-radius: 10px; cursor: pointer; border: none; }
        #container { flex-grow: 1; height: 100vh; position: relative; }
        #status { position: absolute; top: 10px; left: 10px; color: #0f0; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <div id="panel">
        <button class="btn" onclick="spawn()"></button>
        <p style="font-size: 10px;">SPAWN</p>
    </div>
    <div id="container">
        <div id="status">System Initializing...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script>
        let scene, camera, renderer, egg;
        const status = document.getElementById('status');

        function init() {
            try {
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 80) / window.innerHeight, 0.1, 1000);
                camera.position.set(30, 30, 30);
                camera.lookAt(0, 0, 0);

                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth - 80, window.innerHeight);
                document.getElementById('container').appendChild(renderer.domElement);

                const grid = new THREE.GridHelper(100, 20, 0x555555, 0x333333);
                scene.add(grid);
                scene.add(new THREE.AmbientLight(0xffffff, 1));

                status.innerText = "System Ready. Press Pink Button.";
                animate();
            } catch (e) {
                status.style.color = "red";
                status.innerText = "Init Error: " + e.message;
            }
        }

        window.spawn = function() {
            try {
                if (egg) return;
                const geometry = new THREE.SphereGeometry(5, 32, 32);
                const material = new THREE.MeshBasicMaterial({ color: 0xff69b4, wireframe: true });
                egg = new THREE.Mesh(geometry, material);
                scene.add(egg);
                status.innerText = "Egg Spawned!";
            } catch (e) {
                status.style.color = "red";
                status.innerText = "Spawn Error: " + e.message;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (renderer && scene && camera) renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
