<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v5.29.2 - Final Control Sync</title>
    <style>
        body { margin: 0; background-color: #ffffff; color: #111; overflow: hidden; display: flex; font-family: monospace; touch-action: none; user-select: none; }
        #panel { width: 80px; height: 100vh; background: #e0e0e0; border-right: 1px solid #ccc; display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100; }
        .btn { width: 50px; height: 50px; cursor: pointer; border: 2px solid #fff; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; border-radius: 8px; background: #eee; }
        .egg-btn { background: #ff69b4; border-radius: 50%; width: 40px; height: 50px; }
        .egg-btn.active { background: #28a745; box-shadow: 0 0 15px rgba(40,167,69,0.5); }
        .undo-btn { background: #333; color: white; }
        #canvas-container { flex-grow: 1; position: relative; }
        #v-tag { position: absolute; bottom: 15px; right: 20px; color: #444; font-size: 12px; font-weight: bold; pointer-events: none; }
        #palette { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 12px; display: none; grid-template-columns: repeat(2, 1fr); gap: 5px; border: 1px solid #ccc; z-index: 200; }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        #select-box { border: 2px dashed #ff69b4; background-color: rgba(255, 105, 180, 0.1); position: absolute; pointer-events: none; display: none; z-index: 300; }
    </style>
</head>
<body>

<div id="panel">
    <div class="btn undo-btn" onclick="executeUndo()">UNDO</div>
    <div id="egg-spawn-btn" class="btn egg-btn" onclick="togglePlacementMode()"></div>
</div>

<div id="canvas-container">
    <div id="v-tag">Build-A-Crochet Engine v5.29.2</div>
    <div id="palette">
        <div class="color-dot" style="background: #ff69b4;" onclick="updateColor('#ff69b4')"></div>
        <div class="color-dot" style="background: #ffffff;" onclick="updateColor('#ffffff')"></div>
        <div class="color-dot" style="background: #000000;" onclick="updateColor('#000000')"></div>
    </div>
    <div id="select-box"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, currentEgg, ghostEgg;
    let isPlacementMode = false, dragTarget = null, isDragging = false;
    let rotX_H, rotY_H, rotZ_H, handles = [];
    let startScale, startPos, startRotation, mouseButton;
    let isBoxSelecting = false, boxStart = new THREE.Vector2();
    let selectBoxEl = document.getElementById('select-box');
    let history = [], currentSelection = [];
    
    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const BASE_H = 20, BASE_R = 7, H_OFFSET = 7;
    const SENSITIVITY = 0.7;

    function init() {
        scene = new THREE.Scene(); scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 80) / window.innerHeight, 0.1, 1000);
        camera.position.set(60, 50, 80);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 80, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
        
        scene.add(new THREE.GridHelper(100, 20, 0xcccccc, 0xeeeeee));
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6); dirLight.position.set(10, 20, 10); scene.add(dirLight);
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: null };
        
        createHandles(); createGhost();
        window.addEventListener('pointerdown', onDown);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        captureState(); animate();
    }

    function createEgg(color, isGhost = false) {
        const points = []; for (let i = 0; i <= 20; i++) {
            const t = i / 20, y = t * BASE_H, r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((y - 10) / 10, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geo = new THREE.LatheGeometry(points, 32); geo.translate(0, -10, 0);
        geo.userData.origPos = geo.attributes.position.clone();
        const mat = new THREE.MeshPhongMaterial({ color, wireframe: true, transparent: true, opacity: isGhost ? 0.3 : 0.8 });
        const egg = new THREE.Mesh(geo, mat);
        if (!isGhost) {
            egg.userData.isEgg = true;
            egg.userData.data = { scale: new THREE.Vector3(1, 1, 1), offsets: Array.from({length: 6}, () => new THREE.Vector3()) };
            const outline = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide }));
            outline.scale.set(1.02, 1.02, 1.02); egg.add(outline); egg.userData.outline = outline;
        }
        return egg;
    }

    function updateMesh(egg) {
        if(!egg) return;
        const pos = egg.geometry.attributes.position, orig = egg.geometry.userData.origPos;
        const { scale, offsets } = egg.userData.data;
        const ctrls = [new THREE.Vector3(0,10,0), new THREE.Vector3(0,-10,0), new THREE.Vector3(-7,0,0), new THREE.Vector3(7,0,0), new THREE.Vector3(0,0,7), new THREE.Vector3(0,0,-7)];
        for (let i = 0; i < orig.count; i++) {
            const v = new THREE.Vector3(orig.getX(i), orig.getY(i), orig.getZ(i)), sV = v.clone().multiply(scale);
            let tw = 0; const sOff = new THREE.Vector3();
            for (let j = 0; j < 6; j++) {
                const w = 1 / Math.pow(v.distanceTo(ctrls[j]) + 1, 3.5); tw += w;
                sOff.add(offsets[j].clone().multiplyScalar(w));
            }
            pos.setXYZ(i, sV.x + (sOff.x/tw), sV.y + (sOff.y/tw), sV.z + (sOff.z/tw));
        }
        pos.needsUpdate = true;
        egg.userData.outline.geometry.attributes.position.copy(pos).needsUpdate = true;
    }

    function createHandles() {
        const makeH = (id) => {
            const m = new THREE.Mesh(new THREE.SphereGeometry(1.8, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffcc00, depthTest: false }));
            m.renderOrder = 999; m.visible = false; m.userData = { isHandle: true, id };
            scene.add(m); return m;
        };
        handles = [0,1,2,3,4,5].map(id => makeH(id));
        const makeR = (col) => {
            const r = new THREE.Mesh(new THREE.TorusGeometry(22, 0.3, 16, 64), new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.4, depthTest: false }));
            r.renderOrder = 998; r.visible = false; scene.add(r); return r;
        };
        rotX_H = makeR(0xff0000); rotY_H = makeR(0x00ff00); rotZ_H = makeR(0x0000ff);
    }

    function updateSelectionVisuals(selected) {
        scene.children.filter(o => o.userData.isEgg).forEach(e => e.userData.outline.scale.set(1.02,1.02,1.02));
        currentSelection = selected;
        if (selected.length === 0) { deselectAll(); return; }
        selected.forEach(e => e.userData.outline.scale.set(1.1, 1.1, 1.1));
        currentEgg = selected[0];
        [...handles, rotX_H, rotY_H, rotZ_H].forEach(h => h.visible = true);
        document.getElementById('palette').style.display = 'grid';
    }

    function deselectAll() {
        currentEgg = null; currentSelection = [];
        [...handles, rotX_H, rotY_H, rotZ_H].forEach(h => h.visible = false);
        document.getElementById('palette').style.display = 'none';
        scene.children.filter(o => o.userData.isEgg).forEach(e => e.userData.outline.scale.set(1.02,1.02,1.02));
    }

    function onDown(e) {
        if (e.target.tagName !== 'CANVAS') return;
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster(); raycaster.setFromCamera(mouse, camera);

        const hits = raycaster.intersectObjects([...handles, rotX_H, rotY_H, rotZ_H, ...scene.children.filter(o => o.userData.isEgg)]);
        
        if (hits.length > 0) {
            // 배치 모드여도 이미 있는 객체를 클릭하면 변형 모드 우선
            dragTarget = hits[0].object; isDragging = true; mouseButton = e.button;
            controls.enabled = false;
            if(dragTarget.userData.isEgg) {
                if (!e.ctrlKey) updateSelectionVisuals([dragTarget]);
                else if (!currentSelection.includes(dragTarget)) { currentSelection.push(dragTarget); updateSelectionVisuals(currentSelection); }
            }
            startRotation = currentEgg ? currentEgg.quaternion.clone() : null;
            startPos = currentEgg ? currentEgg.position.clone() : null;
            if(dragTarget.userData.isHandle) startScale = currentEgg.userData.data.scale.clone();
            const sPos = dragTarget.position.clone().project(camera);
            startMouseAngle = Math.atan2(e.clientY - (rect.top + (1 - sPos.y) * rect.height / 2), e.clientX - (rect.left + (1 + sPos.x) * rect.width / 2));
        } else {
            if (isPlacementMode && e.button === 0) {
                let intersect = new THREE.Vector3(); if (raycaster.ray.intersectPlane(groundPlane, intersect)) spawnEgg(intersect);
            } else if (e.button === 0) {
                controls.enabled = true; deselectAll();
            } else if (e.button === 2) {
                isBoxSelecting = true; boxStart.set(e.clientX, e.clientY);
                selectBoxEl.style.display = 'block'; selectBoxEl.style.width = '0px'; selectBoxEl.style.height = '0px';
                controls.enabled = false;
            }
        }
    }

    function onMove(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster(); raycaster.setFromCamera(mouse, camera);

        if (isPlacementMode) {
            let intersect = new THREE.Vector3(); 
            if (raycaster.ray.intersectPlane(groundPlane, intersect)) { 
                ghostEgg.position.copy(intersect).y += 10; ghostEgg.visible = true; 
            }
            return;
        }
        if (isBoxSelecting) {
            const x = Math.min(boxStart.x, e.clientX), y = Math.min(boxStart.y, e.clientY);
            const w = Math.abs(e.clientX - boxStart.x), h = Math.abs(e.clientY - boxStart.y);
            selectBoxEl.style.left = x + 'px'; selectBoxEl.style.top = y + 'px'; selectBoxEl.style.width = w + 'px'; selectBoxEl.style.height = h + 'px'; return;
        }
        if (!dragTarget || !currentEgg) return;

        if ([rotX_H, rotY_H, rotZ_H].includes(dragTarget)) {
            const sPos = dragTarget.position.clone().project(camera);
            const angle = Math.atan2(e.clientY - (rect.top + (1 - sPos.y) * rect.height / 2), e.clientX - (rect.left + (1 + sPos.x) * rect.width / 2));
            const axis = dragTarget === rotX_H ? new THREE.Vector3(1,0,0) : dragTarget === rotY_H ? new THREE.Vector3(0,1,0) : new THREE.Vector3(0,0,1);
            currentEgg.quaternion.multiplyQuaternions(startRotation, new THREE.Quaternion().setFromAxisAngle(axis, -(angle - startMouseAngle)));
        } else if (dragTarget.userData.isEgg) {
            const plane = new THREE.Plane(camera.getWorldDirection(new THREE.Vector3()).negate(), -startPos.dot(camera.getWorldDirection(new THREE.Vector3()).negate()));
            let intersect = new THREE.Vector3(); if (raycaster.ray.intersectPlane(plane, intersect)) {
                if(!e.ctrlKey || mouseButton !== 0) { const diff = intersect.sub(currentEgg.position); currentSelection.forEach(e => e.position.add(diff)); }
                else currentEgg.position.copy(intersect);
            }
        } else if (dragTarget.userData.isHandle) {
            const plane = new THREE.Plane(camera.getWorldDirection(new THREE.Vector3()).negate(), -dragTarget.position.dot(camera.getWorldDirection(new THREE.Vector3()).negate()));
            let intersect = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, intersect)) {
                const localDiff = intersect.sub(dragTarget.position).applyQuaternion(currentEgg.quaternion.clone().invert());
                const data = currentEgg.userData.data, id = dragTarget.userData.id;
                if (mouseButton === 0 && !e.ctrlKey) {
                    const dir = (id === 0 || id === 3 || id === 4) ? 1 : -1;
                    const ds = (id < 2 ? localDiff.y : (id < 4 ? localDiff.x : localDiff.z)) * dir / (id < 2 ? BASE_H : BASE_R * 2) * SENSITIVITY;
                    data.scale.addScalar(ds); data.scale.x = Math.max(0.1, data.scale.x); data.scale.y = Math.max(0.1, data.scale.y); data.scale.z = Math.max(0.1, data.scale.z);
                    currentEgg.position.copy(startPos).add(new THREE.Vector3(0, (data.scale.y - startScale.y) * BASE_H / 2 * (id === 0 ? 1 : (id === 1 ? -1 : 0)), 0).applyQuaternion(currentEgg.quaternion));
                } else if (mouseButton === 2) {
                    if (id < 2) { const dir = id === 0 ? 1 : -1; data.scale.y = Math.max(0.1, startScale.y + (localDiff.y * dir / BASE_H) * SENSITIVITY); currentEgg.position.copy(startPos).add(new THREE.Vector3(0, (data.scale.y - startScale.y) * BASE_H / 2 * dir, 0).applyQuaternion(currentEgg.quaternion)); }
                    else if (id < 4) { const dir = id === 3 ? 1 : -1; data.scale.x = Math.max(0.1, startScale.x + (localDiff.x * dir / (BASE_R * 2)) * SENSITIVITY); currentEgg.position.copy(startPos).add(new THREE.Vector3((data.scale.x - startScale.x) * BASE_R * dir, 0, 0).applyQuaternion(currentEgg.quaternion)); }
                    else { const dir = id === 4 ? 1 : -1; data.scale.z = Math.max(0.1, startScale.z + (localDiff.z * dir / (BASE_R * 2)) * SENSITIVITY); currentEgg.position.copy(startPos).add(new THREE.Vector3(0, 0, (data.scale.z - startScale.z) * BASE_R * dir).applyQuaternion(currentEgg.quaternion)); }
                } else if (mouseButton === 0 && e.ctrlKey) { data.offsets[id].add(localDiff); }
                updateMesh(currentEgg);
            }
        }
    }

    function onUp(e) {
        if (isBoxSelecting) {
            isBoxSelecting = false; selectBoxEl.style.display = 'none';
            const rect = renderer.domElement.getBoundingClientRect();
            const minX = Math.min(boxStart.x, e.clientX), minY = Math.min(boxStart.y, e.clientY);
            const maxX = Math.max(boxStart.x, e.clientX), maxY = Math.max(boxStart.y, e.clientY);
            if(Math.abs(maxX-minX) > 5) {
                const selected = scene.children.filter(o => o.userData.isEgg).filter(egg => {
                    const sp = egg.position.clone().project(camera);
                    const x = (sp.x + 1) * rect.width / 2 + rect.left, y = (1 - sp.y) * rect.height / 2 + rect.top;
                    return (x >= minX && x <= maxX && y >= minY && y <= maxY);
                });
                updateSelectionVisuals(selected);
            }
        }
        if (isDragging) captureState(); isDragging = false; dragTarget = null; controls.enabled = true;
    }

    function createGhost() { ghostEgg = createEgg(0x28a745, true); ghostEgg.visible = false; scene.add(ghostEgg); }
    function captureState() {
        const state = scene.children.filter(o => o.userData.isEgg).map(e => ({ pos: {x: e.position.x, y: e.position.y, z: e.position.z}, rot: {x: e.quaternion.x, y: e.quaternion.y, z: e.quaternion.z, w: e.quaternion.w}, scale: {x: e.userData.data.scale.x, y: e.userData.data.scale.y, z: e.userData.data.scale.z}, offsets: e.userData.data.offsets.map(o => ({x: o.x, y: o.y, z: o.z})), col: e.material.color.getHex() }));
        history.push(JSON.stringify(state)); if (history.length > 50) history.shift();
    }
    window.executeUndo = function() {
        if (history.length < 2) return; history.pop(); const state = JSON.parse(history[history.length - 1]);
        scene.children.filter(o => o.userData.isEgg).forEach(e => { e.geometry.dispose(); e.material.dispose(); scene.remove(e); });
        state.forEach(d => { const e = createEgg(new THREE.Color(d.col)); e.position.set(d.pos.x, d.pos.y, d.pos.z); e.quaternion.set(d.rot.x, d.rot.y, d.rot.z, d.rot.w); e.userData.data.scale.set(d.scale.x, d.scale.y, d.scale.z); e.userData.data.offsets = d.offsets.map(o => new THREE.Vector3(o.x, o.y, o.z)); updateMesh(e); scene.add(e); });
        deselectAll();
    };
    function togglePlacementMode() { isPlacementMode = !isPlacementMode; ghostEgg.visible = isPlacementMode; document.getElementById('egg-spawn-btn').classList.toggle('active', isPlacementMode); }
    function spawnEgg(pos) { const egg = createEgg(0xff69b4); egg.position.copy(pos).y += 10; scene.add(egg); captureState(); updateSelectionVisuals([egg]); isPlacementMode = false; ghostEgg.visible = false; document.getElementById('egg-spawn-btn').classList.remove('active'); }
    function animate() {
        requestAnimationFrame(animate);
        if (currentEgg) {
            const { scale, offsets } = currentEgg.userData.data, p = currentEgg.position, q = currentEgg.quaternion;
            const ctrls = [new THREE.Vector3(0,10,0), new THREE.Vector3(0,-10,0), new THREE.Vector3(-7,0,0), new THREE.Vector3(7,0,0), new THREE.Vector3(0,0,7), new THREE.Vector3(0,0,-7)];
            handles.forEach((h, i) => { const lP = ctrls[i].clone().multiply(scale).add(offsets[i]).add(ctrls[i].clone().normalize().multiplyScalar(H_OFFSET)); h.position.copy(p).add(lP.applyQuaternion(q)); });
            [rotX_H, rotY_H, rotZ_H].forEach(r => { r.position.copy(p); r.quaternion.copy(q); if(r===rotX_H) r.rotateY(Math.PI/2); if(r===rotY_H) r.rotateX(Math.PI/2); });
        }
        renderer.render(scene, camera); controls.update();
    }
    window.onload = init; window.updateColor = (c) => { if(currentEgg) { currentEgg.material.color.set(c); captureState(); } };
</script>
</body>
</html>
