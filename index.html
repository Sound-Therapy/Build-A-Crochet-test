<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v5.7.5</title>
    <style>
        body { margin: 0; background-color: #111; color: #0f0; overflow: hidden; display: flex; font-family: monospace; touch-action: none; }
        #panel { width: 80px; height: 100vh; background: #222; border-right: 1px solid #444; display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100; }
        .btn { width: 50px; height: 50px; background: #ff69b4; border: 2px solid #fff; border-radius: 10px; cursor: pointer; }
        #canvas-container { flex-grow: 1; position: relative; background: #000; }
        #v-tag { position: absolute; bottom: 15px; right: 20px; color: #777; font-size: 12px; font-weight: bold; z-index: 200; }
    </style>
</head>
<body>

<div id="panel">
    <button class="btn" onclick="handleSpawn()"></button>
    <div style="font-size: 10px; margin-top: 5px; color: #ccc;">ADD EGG</div>
</div>

<div id="canvas-container">
    <div id="v-tag">Build-A-Crochet Engine v5.7.5</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, egg;
    let moveH, topH, bottomH, leftH, rightH, frontH, backH;
    let rotX_H, rotY_H, rotZ_H;
    let dragTarget = null;
    let plane = new THREE.Plane();
    let planeIntersect = new THREE.Vector3();
    let dragStartOffset = new THREE.Vector3();
    let startRotation = new THREE.Quaternion();
    let startMouseAngle = 0;

    const BASE_H = 20, BASE_R = 7;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 80) / window.innerHeight, 0.1, 1000);
        camera.position.set(60, 50, 80);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 80, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(100, 20, 0x444444, 0x222222));
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        window.addEventListener('pointerdown', onDown);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        animate();
    }

    function createRing(axis, color) {
        const geometry = new THREE.TorusGeometry(22, 0.2, 16, 64);
        const material = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.4 });
        const ring = new THREE.Mesh(geometry, material);
        if (axis === 'x') ring.rotation.y = Math.PI / 2;
        if (axis === 'y') ring.rotation.x = Math.PI / 2;
        ring.visible = false;
        scene.add(ring);
        return ring;
    }

    window.handleSpawn = function() {
        if (egg) return;
        const points = [];
        for (let i = 0; i <= 20; i++) {
            const t = i / 20;
            const y = t * BASE_H;
            const r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((y - 10) / 10, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geo = new THREE.LatheGeometry(points, 32);
        geo.translate(0, -10, 0); 
        const mat = new THREE.MeshPhongMaterial({ color: 0xff69b4, wireframe: true, transparent: true, opacity: 0.6 });
        egg = new THREE.Mesh(geo, mat);
        scene.add(egg);

        const hGeo = new THREE.SphereGeometry(1.3, 16, 16);
        const makeH = (col) => {
            const m = new THREE.Mesh(hGeo, new THREE.MeshBasicMaterial({ color: col }));
            m.visible = false; scene.add(m); return m;
        };

        moveH = makeH(0x28a745); 
        topH = makeH(0x007bff);    bottomH = makeH(0x00d4ff); 
        leftH = makeH(0x00ffff);   rightH = makeH(0x0056b3);  
        frontH = makeH(0xffff00);  backH = makeH(0xffa500);   

        rotX_H = createRing('x', 0xff0000); 
        rotY_H = createRing('y', 0x00ff00); 
        rotZ_H = createRing('z', 0x0000ff);
    };

    function getMouseAngle(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        return Math.atan2(e.clientY - centerY, e.clientX - centerX);
    }

    function onDown(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);

        const allHandles = [moveH, topH, bottomH, leftH, rightH, frontH, backH, rotX_H, rotY_H, rotZ_H];
        const hits = raycaster.intersectObjects([egg, ...allHandles].filter(o => o && (o.visible || o === egg)));
        
        if (hits.length > 0) {
            const obj = hits[0].object;
            if (obj === egg) {
                allHandles.forEach(h => h.visible = true);
            } else {
                dragTarget = obj;
                controls.enabled = false;
                startRotation.copy(egg.quaternion);
                
                const normal = (dragTarget === topH || dragTarget === bottomH || dragTarget === moveH) ? new THREE.Vector3(0, 0, 1) : new THREE.Vector3(0, 1, 0);
                plane.setFromNormalAndCoplanarPoint(normal, dragTarget.position);
                
                raycaster.ray.intersectPlane(plane, planeIntersect);
                dragStartOffset.copy(planeIntersect).sub(dragTarget.position);
                
                // 회전 시작 기준 각도 저장
                startMouseAngle = getMouseAngle(e);
            }
        } else {
            allHandles.forEach(h => h.visible = false);
        }
    }

    function onMove(e) {
        if (!dragTarget || !egg) return;
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);

        if (raycaster.ray.intersectPlane(plane, planeIntersect)) {
            const pos = planeIntersect.sub(dragStartOffset);
            
            if (dragTarget === moveH) {
                egg.position.copy(pos.clone().sub(new THREE.Vector3(0, (BASE_H * egg.scale.y)/2 + 5, 0)));
            } else if ([rotX_H, rotY_H, rotZ_H].includes(dragTarget)) {
                // 💡 부호 반전(-)으로 마우스 드래그 방향과 동기화
                const currentAngle = getMouseAngle(e);
                const deltaAngle = -(currentAngle - startMouseAngle); 
                
                const axis = new THREE.Vector3();
                if (dragTarget === rotX_H) axis.set(1, 0, 0);
                else if (dragTarget === rotY_H) axis.set(0, 1, 0);
                else if (dragTarget === rotZ_H) axis.set(0, 0, 1);
                
                const q = new THREE.Quaternion().setFromAxisAngle(axis, deltaAngle);
                egg.quaternion.multiplyQuaternions(q, startRotation);
            } else {
                // 앵커 스케일 로직
                if (dragTarget === topH) {
                    const bottomY = egg.position.y - (BASE_H * egg.scale.y)/2;
                    egg.scale.y = Math.max(0.1, (pos.y - bottomY) / BASE_H);
                    egg.position.y = bottomY + (BASE_H * egg.scale.y)/2;
                } else if (dragTarget === bottomH) {
                    const topY = egg.position.y + (BASE_H * egg.scale.y)/2;
                    egg.scale.y = Math.max(0.1, (topY - pos.y) / BASE_H);
                    egg.position.y = topY - (BASE_H * egg.scale.y)/2;
                } else if (dragTarget === rightH) {
                    const leftX = egg.position.x - (BASE_R * 2 * egg.scale.x)/2;
                    egg.scale.x = Math.max(0.1, (pos.x - leftX) / (BASE_R * 2));
                    egg.position.x = leftX + (BASE_R * 2 * egg.scale.x)/2;
                } else if (dragTarget === leftH) {
                    const rightX = egg.position.x + (BASE_R * 2 * egg.scale.x)/2;
                    egg.scale.x = Math.max(0.1, (rightX - pos.x) / (BASE_R * 2));
                    egg.position.x = rightX - (BASE_R * 2 * egg.scale.x)/2;
                } else if (dragTarget === frontH) {
                    const backZ = egg.position.z - (BASE_R * 2 * egg.scale.z)/2;
                    egg.scale.z = Math.max(0.1, (pos.z - backZ) / (BASE_R * 2));
                    egg.position.z = backZ + (BASE_R * 2 * egg.scale.z)/2;
                } else if (dragTarget === backH) {
                    const frontZ = egg.position.z + (BASE_R * 2 * egg.scale.z)/2;
                    egg.scale.z = Math.max(0.1, (frontZ - pos.z) / (BASE_R * 2));
                    egg.position.z = frontZ - (BASE_R * 2 * egg.scale.z)/2;
                }
            }
        }
    }

    function onUp() { dragTarget = null; controls.enabled = true; }

    function animate() {
        requestAnimationFrame(animate);
        if (egg && moveH) {
            const curHY = (BASE_H * egg.scale.y)/2, curWX = (BASE_R * 2 * egg.scale.x)/2, curDZ = (BASE_R * 2 * egg.scale.z)/2;
            const center = egg.position;
            
            moveH.position.set(center.x, center.y + curHY + 5, center.z);
            topH.position.set(center.x, center.y + curHY, center.z);
            bottomH.position.set(center.x, center.y - curHY, center.z);
            rightH.position.set(center.x + curWX, center.y, center.z);
            leftH.position.set(center.x - curWX, center.y, center.z);
            frontH.position.set(center.x, center.y, center.z + curDZ);
            backH.position.set(center.x, center.y, center.z - curDZ);
            [rotX_H, rotY_H, rotZ_H].forEach(r => r.position.copy(center));
        }
        renderer.render(scene, camera);
        controls.update();
    }
    window.onload = init;
</script>
</body>
</html>
