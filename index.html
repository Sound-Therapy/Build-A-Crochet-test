        #pattern-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: white; border: 1px solid #ccc; border-radius: 12px; padding: 20px; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.2); font-family: monospace; }
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }

    <div id="palette">
        <script>
            const colors = ['#ffffff','#f0f0f0','#d0d0d0','#808080','#404040','#000000', '#ff0000','#dc3545','#ff6b6b','#ff8787','#ff69b4','#fcc2d7', '#fd7e14','#f76707','#ff922b','#ffd43b','#fff3bf','#fab005', '#28a745','#40c057','#8ce99a','#12b886','#087f5b','#b2f2bb', '#007bff','#228be6','#74c0fc','#15aabf','#4dabf7','#a5d8ff', '#6f42c1','#7950f2','#be4bdb','#eebefa','#85501d','#d7b49e'];
            colors.forEach(c => document.write(`<div class="color-dot" style="background:${c};" onclick="updateColor('${c}')"></div>`));

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    // --- [ Core Global Variables ] ---
    let scene, camera, renderer, controls, currentEgg, ghostEgg;
    let isPlacementMode = false, dragTarget = null, isDragging = false;
    let rotX_H, rotY_H, rotZ_H, handles = [];
    let groupGizmo, groupHandles = [], groupRotHandles = [];
    let patternStartMarkers = [];
    let selectedPatternStart = null;
    let startScale, startPos, startRotation, mouseButton, startGroupData = [], lastMouseAngle = 0;
    let worldAnchorPos = new THREE.Vector3(), startIntersect = new THREE.Vector3(), startHandleDist = 1;
    let isBoxSelecting = false, boxStart = new THREE.Vector2();
    let selectBoxEl = document.getElementById('select-box');
    let history = [], redoStack = [], currentSelection = [];
    
    // --- [ Extended Yarn Data (8 Steps) ] ---
    const yarnWeights = {
        micro_0: {roundH: 0.15, label: "0 Lace/Micro"},
        fine_1: {roundH: 0.22, label: "1 Super Fine"},
        fine_2: {roundH: 0.28, label: "2 Fine"},
        light_3: {roundH: 0.32, label: "3 Light"},
        medium_4: {roundH: 0.38, label: "4 Medium"},
        bulky_5: {roundH: 0.52, label: "5 Bulky"},
        super_6: {roundH: 0.75, label: "6 Super Bulky"},
        jumbo_7: {roundH: 1.10, label: "7 Jumbo"}
    };
    const colorNames = {'#ffffff':'White','#000000':'Black','#ff0000':'Red','#ff69b4':'Pink','#28a745':'Green','#007bff':'Blue','#ffd43b':'Yellow'};
    const CM_RATIO = 0.5, BASE_H = 20, BASE_R = 7, H_OFFSET = 7;
    const LEARN_DB_KEY = "bac_learning_v2";
    let lastGenerationContext = null;
    const learningState = {
        stitchWidthByWeight: {},
        roundHeightScaleByWeight: {},
        instructionModelByWeight: {},
        samples: []
    };

    function getDefaultStitchWidthCm(config) {
        return Math.max(0.15, config.roundH * 1.6);
    }

    function loadLearningState() {
        try {
            const raw = localStorage.getItem(LEARN_DB_KEY);
            if (!raw) return;
            const parsed = JSON.parse(raw);
            if (parsed && typeof parsed === "object") {
                learningState.stitchWidthByWeight = parsed.stitchWidthByWeight || {};
                learningState.roundHeightScaleByWeight = parsed.roundHeightScaleByWeight || {};
                learningState.instructionModelByWeight = parsed.instructionModelByWeight || {};
                learningState.samples = Array.isArray(parsed.samples) ? parsed.samples : [];
            }
        } catch (e) {}
    }

    function saveLearningState() {
        const payload = {
            stitchWidthByWeight: learningState.stitchWidthByWeight,
            roundHeightScaleByWeight: learningState.roundHeightScaleByWeight,
            instructionModelByWeight: learningState.instructionModelByWeight,
            samples: learningState.samples.slice(-80)
        };
        localStorage.setItem(LEARN_DB_KEY, JSON.stringify(payload));
    }

    function classifyInstruction(desc = "") {
        const t = String(desc || "").toLowerCase();
        if (t.includes("magic")) return "magic";
        if (t.includes("color")) return "color";
        if (t.includes("dec")) return "dec";
        if (t.includes("inc")) return "inc";
        return "sc";
    }

    function buildDesignSignature(targets, weightKey) {
        const box = new THREE.Box3();
        targets.forEach(obj => {
            obj.geometry.computeBoundingBox();
            box.union(obj.geometry.boundingBox.clone().applyMatrix4(obj.matrixWorld));
        });
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        return {
            weightKey,
            count: targets.length,
            w: Number((size.x * CM_RATIO).toFixed(2)),
            h: Number((size.y * CM_RATIO).toFixed(2)),
            d: Number((size.z * CM_RATIO).toFixed(2)),
            cx: Number((center.x * CM_RATIO).toFixed(2)),
            cy: Number((center.y * CM_RATIO).toFixed(2)),
            cz: Number((center.z * CM_RATIO).toFixed(2))
        };
    }

    function signatureDistance(a, b) {
        if (!a || !b) return Infinity;
        if (a.weightKey !== b.weightKey) return Infinity;
        const dc = Math.abs((a.count || 0) - (b.count || 0)) * 2.0;
        const ds = Math.abs((a.w || 0) - (b.w || 0)) + Math.abs((a.h || 0) - (b.h || 0)) + Math.abs((a.d || 0) - (b.d || 0));
        const dp = (Math.abs((a.cx || 0) - (b.cx || 0)) + Math.abs((a.cy || 0) - (b.cy || 0)) + Math.abs((a.cz || 0) - (b.cz || 0))) * 0.25;
        return dc + ds + dp;
    }

    function getBestLearnedPattern(signature) {
        let best = null;
        let bestDist = Infinity;
        learningState.samples.forEach(s => {
            if (!s || !s.signature || !Array.isArray(s.corrected)) return;
            const dist = signatureDistance(signature, s.signature);
            if (dist < bestDist) {
                bestDist = dist;
                best = s;
            }
        });
        if (!best) return null;
        if (bestDist > 0.25) return null;
        return best;
    }

    function getShapeRatios(signature) {
        const w = Math.max(0.01, signature.w || 0.01);
        const h = Math.max(0.01, signature.h || 0.01);
        const d = Math.max(0.01, signature.d || 0.01);
        return {
            wh: w / h,
            dh: d / h,
            wd: w / d
        };
    }

    function getBestGeneralizedSample(signature) {
        const a = getShapeRatios(signature);
        let best = null;
        let bestDist = Infinity;
        learningState.samples.forEach(s => {
            if (!s || !s.signature || !Array.isArray(s.corrected)) return;
            if (s.signature.weightKey !== signature.weightKey) return;
            const b = getShapeRatios(s.signature);
            const ratioDist = Math.abs(a.wh - b.wh) + Math.abs(a.dh - b.dh) + Math.abs(a.wd - b.wd);
            const countPenalty = Math.abs((signature.count || 0) - (s.signature.count || 0)) * 0.4;
            const dist = ratioDist + countPenalty;
            if (dist < bestDist) {
                bestDist = dist;
                best = s;
            }
        });
        if (!best) return null;
        if (bestDist > 1.2) return null;
        return best;
    }

    function normalizeEditedRows(rows) {
        return (rows || [])
            .filter(r => Number.isFinite(r.sts) && r.sts > 0 && String(r.desc || "").trim().length > 0)
            .map((r, i) => ({ rnd: i + 1, desc: String(r.desc || "").trim(), sts: Math.round(r.sts) }));
    }

    function generateInstructionFromKind(kind, sts, prevSts) {
        if (kind === "magic") return "6 sc in magic ring";
        if (kind === "inc") {
            const delta = Math.max(1, sts - prevSts);
            return `inc x${delta}`;
        }
        if (kind === "dec") {
            const delta = Math.max(1, prevSts - sts);
            return `dec x${delta}`;
        }
        return "sc around";
    }

    function buildGeneralizedRoundsFromSample(sampleRows, baseRounds) {
        const src = normalizeEditedRows(sampleRows);
        if (!src.length) return baseRounds;

        const targetLen = Math.max(4, (baseRounds || []).length || src.length);
        const targetMax = Math.max(6, ...(baseRounds || []).map(r => r.sts || 0));
        const srcMax = Math.max(6, ...src.map(r => r.sts || 0));

        const stuffIdxSrc = src.findIndex(r => String(r.desc || "").toLowerCase().includes("stuff"));
        const stuffRatio = stuffIdxSrc >= 0 ? (stuffIdxSrc / Math.max(1, src.length - 1)) : null;

        const out = [];
        let prevSts = 6;
        for (let i = 0; i < targetLen; i++) {
            const srcIdx = Math.round((i / Math.max(1, targetLen - 1)) * Math.max(0, src.length - 1));
            const srcRow = src[srcIdx];
            const kind = i === 0 ? "magic" : classifyInstruction(srcRow.desc);

            let sts;
            if (i === 0) sts = 6;
            else {
                const scaled = Math.max(1, Math.round((srcRow.sts / srcMax) * targetMax));
                sts = Math.max(6, Math.round(scaled / 6) * 6);
                if (kind === "inc" && sts <= prevSts) sts = prevSts + 6;
                if (kind === "dec" && sts >= prevSts) sts = Math.max(6, prevSts - 6);
                if (kind === "sc") sts = prevSts;
            }

            const desc = generateInstructionFromKind(kind, sts, prevSts);
            out.push({ rnd: i + 1, desc, sts });
            prevSts = sts;
        }

        if (stuffRatio !== null && out.length >= 4) {
            const stuffIdx = Math.max(1, Math.min(out.length - 2, Math.round(stuffRatio * (out.length - 1))));
            out[stuffIdx].desc = `${out[stuffIdx].desc} | stuff firmly`;
        }
        return out;
    }

    function getVertexCloud(targets) {
        const cloud = [];
        let sumX = 0, sumZ = 0, count = 0;
        let minY = Infinity, maxY = -Infinity;
        targets.forEach(obj => {
            const pos = obj.geometry.attributes.position;
            const matrix = obj.matrixWorld;
            for (let i = 0; i < pos.count; i++) {
                const v = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i)).applyMatrix4(matrix);
                cloud.push(v);
                sumX += v.x; sumZ += v.z; count++;
                if (v.y < minY) minY = v.y;
                if (v.y > maxY) maxY = v.y;
            }
        });
        return {
            vertices: cloud,
            centerX: count ? (sumX / count) : 0,
            centerZ: count ? (sumZ / count) : 0,
            minY: isFinite(minY) ? minY : 0,
            maxY: isFinite(maxY) ? maxY : 0
        };
    }

    function clearPatternStartSelection() {
        selectedPatternStart = null;
        updatePatternStartMarkerVisuals();
    }

    function getPatternStartLabel(pole) {
        return pole === 'top' ? 'Top' : 'Bottom';
    }

    function getPatternMarkerLocalPoints(egg) {
        if (!egg || !egg.geometry) return null;
        egg.geometry.computeBoundingBox();
        const box = egg.geometry.boundingBox;
        if (!box) return null;
        const centerX = (box.min.x + box.max.x) * 0.5;
        const centerZ = (box.min.z + box.max.z) * 0.5;
        return {
            top: new THREE.Vector3(centerX, box.max.y, centerZ),
            bottom: new THREE.Vector3(centerX, box.min.y, centerZ)
        };
    }

    function updatePatternStartMarkerVisuals() {
        patternStartMarkers.forEach(marker => {
            const isSelected = selectedPatternStart
                && selectedPatternStart.egg === marker.userData.egg
                && selectedPatternStart.pole === marker.userData.pole;
            marker.material.color.set(isSelected ? 0x00c853 : 0xffffff);
            marker.material.opacity = isSelected ? 1.0 : 0.9;
            marker.scale.setScalar(isSelected ? 1.2 : 1.0);
        });
    }

    function updatePatternStartMarkers() {
        if (currentSelection.length !== 1 || !currentEgg) {
            patternStartMarkers.forEach(marker => marker.visible = false);
            return;
        }

        const localPoints = getPatternMarkerLocalPoints(currentEgg);
        if (!localPoints) {
            patternStartMarkers.forEach(marker => marker.visible = false);
            return;
        }

        const box = currentEgg.geometry.boundingBox;
        const padding = Math.max(1.8, (box.max.y - box.min.y) * 0.08);
        const worldTop = localPoints.top.clone().applyQuaternion(currentEgg.quaternion).add(currentEgg.position);
        const worldBottom = localPoints.bottom.clone().applyQuaternion(currentEgg.quaternion).add(currentEgg.position);
        const upDir = new THREE.Vector3(0, 1, 0).applyQuaternion(currentEgg.quaternion).normalize();

        patternStartMarkers.forEach(marker => {
            marker.userData.egg = currentEgg;
            marker.visible = true;
            const offset = marker.userData.pole === 'top'
                ? upDir.clone().multiplyScalar(padding)
                : upDir.clone().multiplyScalar(-padding);
            marker.position.copy(marker.userData.pole === 'top' ? worldTop : worldBottom).add(offset);
        });

        updatePatternStartMarkerVisuals();
    }

    function buildRoundsFromSlices(targets, weightKey, config, startPole = 'bottom') {
        const signature = buildDesignSignature(targets, weightKey);
        const stepCm = Math.max(0.1, config.roundH);
        const stitchWidthCm = learningState.stitchWidthByWeight[weightKey] || getDefaultStitchWidthCm(config);

        // Deterministic sphere math:
        // 1) Equator stitches from circumference pi*D
        // 2) Increase/decrease by 6 stitches per round
        // 3) Middle sc rounds from target height
        const diameterCm = Math.max(0.5, ((signature.w || 0) + (signature.d || 0)) * 0.5);
        const circumferenceCm = Math.PI * diameterCm;
        const targetMaxStsRaw = Math.max(6, Math.round(circumferenceCm / Math.max(0.1, stitchWidthCm)));
        const targetMaxSts = Math.max(6, Math.round(targetMaxStsRaw / 6) * 6);
        const incRounds = Math.max(1, Math.round(targetMaxSts / 6) - 1);

        const estTotalRounds = Math.max((incRounds * 2) + 1, Math.round(Math.max(0.5, signature.h || diameterCm) / stepCm));
        const scRounds = Math.max(0, estTotalRounds - ((incRounds * 2) + 1));

        const rounds = [];
        rounds.push({ rnd: 1, desc: "6 sc in magic ring", sts: 6 });

        let rowIndex = 2;
        for (let i = 1; i <= incRounds; i++) {
            const sts = 6 * (i + 1);
            const desc = i === 1 ? "inc x6" : `(${i - 1} sc, inc) x6`;
            rounds.push({ rnd: rowIndex++, desc, sts });
        }
        for (let i = 0; i < scRounds; i++) {
            rounds.push({ rnd: rowIndex++, desc: "sc around", sts: targetMaxSts });
        }
        for (let i = incRounds; i >= 1; i--) {
            const sts = 6 * i;
            const desc = i === 1 ? "dec x6" : `(${i - 1} sc, dec) x6`;
            rounds.push({ rnd: rowIndex++, desc, sts });
        }

        if (rounds.length >= 4) {
            const stuffIdx = rounds.length - 3;
            rounds[stuffIdx].desc = `${rounds[stuffIdx].desc} | stuff firmly`;
        }

        const profiles = [{ rnd: 1, circumferenceCm, y: 0, startPole }];
        return { rounds, profiles, stitchWidthCm, stepCm, startPole };
    }

    function validatePattern(rounds) {
        const warnings = [];
        if (!rounds.length) {
            warnings.push("No rounds generated.");
            return warnings;
        }
        if (rounds[0].rnd !== 1) warnings.push("Pattern should start at R1.");
        if (rounds[0].sts !== 6) warnings.push("R1 should start at 6 stitches for standard amigurumi.");

        for (let i = 1; i < rounds.length; i++) {
            const prev = rounds[i - 1];
            const cur = rounds[i];
            const delta = cur.sts - prev.sts;
            const kind = classifyInstruction(cur.desc);
            if (kind === "sc" && delta !== 0) warnings.push(`R${cur.rnd} has sc-only instruction but stitch count changed.`);
            if (kind === "inc" && delta <= 0) warnings.push(`R${cur.rnd} increase row should raise stitch count.`);
            if (kind === "dec" && delta >= 0) warnings.push(`R${cur.rnd} decrease row should lower stitch count.`);
        }
        if (rounds[rounds.length - 1].sts > 8) warnings.push("Final round is not closed enough (expected near 6).");
        return warnings;
    }

    function init() {
        scene = new THREE.Scene(); scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 100) / window.innerHeight, 0.1, 1000);
        camera.position.set(60, 50, 80);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 100, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
        
        scene.add(new THREE.GridHelper(100, 20, 0xcccccc, 0xeeeeee));
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const mainLight = new THREE.DirectionalLight(0xffffff, 0.6);
        mainLight.position.set(10, 20, 15); scene.add(mainLight);
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: null };
        
        createHandles(); createGhost(); createGroupGizmo();
        window.addEventListener('pointerdown', onDown);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        window.addEventListener('keydown', onKeyDown);

    // --- [ Restoration of 5.47.0 Core Physics (3.5th Power) ] ---
    function createEgg(color, isGhost = false) {
        const points = [];
        for (let i = 0; i <= 20; i++) {
            const t = i / 20, y = t * BASE_H, r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((y - 10) / 10, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geo = new THREE.LatheGeometry(points, 32); geo.translate(0, -10, 0);
        geo.userData.origPos = geo.attributes.position.clone();
        const mat = new THREE.MeshLambertMaterial({ color, transparent: true, opacity: isGhost ? 0.3 : 1.0 });
        const egg = new THREE.Mesh(geo, mat);
        if (!isGhost) { 
            egg.userData.isEgg = true; 
            egg.userData.data = { scale: new THREE.Vector3(1, 1, 1), offsets: [0,1,2,3,4,5].map(()=>new THREE.Vector3()) }; 
        }
        return egg;
    }

    function updateMesh(egg) {
        const pos = egg.geometry.attributes.position, orig = egg.geometry.userData.origPos, { scale, offsets } = egg.userData.data;
        const ctrls = [new THREE.Vector3(0,10,0),new THREE.Vector3(0,-10,0),new THREE.Vector3(-7,0,0),new THREE.Vector3(7,0,0),new THREE.Vector3(0,0,7),new THREE.Vector3(0,0,-7)];
        for (let i = 0; i < orig.count; i++) {
            const v = new THREE.Vector3(orig.getX(i), orig.getY(i), orig.getZ(i)), sV = v.clone().multiply(scale);
            let tw = 0; const sOff = new THREE.Vector3();
            for (let j = 0; j < 6; j++) {
                const w = 1 / Math.pow(v.distanceTo(ctrls[j]) + 1, 3.5); // 아버님이 강조하신 3.5제곱
                tw += w; sOff.add(offsets[j].clone().multiplyScalar(w));
            }
            pos.setXYZ(i, sV.x + (sOff.x/tw), sV.y + (sOff.y/tw), sV.z + (sOff.z/tw));
        }
        pos.needsUpdate = true;
    }

    // --- [ Drag & Interaction (Anchor Point Logic) ] ---
    function onDown(e) {

        const ph = ray.intersectObjects(patternStartMarkers.filter(marker => marker.visible));
        if(ph.length>0) {
            const marker = ph[0].object;
            selectedPatternStart = { egg: marker.userData.egg, pole: marker.userData.pole };
            updatePatternStartMarkerVisuals();
            controls.enabled = true;
            isDragging = false;
            dragTarget = null;
            return;
        }

        const gh = ray.intersectObjects([...handles, rotX_H, rotY_H, rotZ_H, ...groupHandles, ...groupRotHandles]);
        if(gh.length>0) {
            clearPatternStartSelection();
            dragTarget = gh[0].object; isDragging=true; mouseButton=e.button; controls.enabled=false;
            const pl = new THREE.Plane(camera.getWorldDirection(new THREE.Vector3()).negate(), -dragTarget.position.dot(camera.getWorldDirection(new THREE.Vector3()).negate()));
            ray.ray.intersectPlane(pl, startIntersect);

                startRotation=currentEgg.quaternion.clone(); startPos=currentEgg.position.clone(); startScale=currentEgg.userData.data.scale.clone();
                if(dragTarget.userData.isHandle){
                    const id=dragTarget.userData.id, opp=(id%2===0)?id+1:id-1;
                    const ctrls=[new THREE.Vector3(0,10,0),new THREE.Vector3(0,-10,0),new THREE.Vector3(-7,0,0),new THREE.Vector3(7,0,0),new THREE.Vector3(0,0,7),new THREE.Vector3(0,0,-7)];
                    worldAnchorPos.copy(ctrls[opp]).multiply(startScale).applyQuaternion(startRotation).add(startPos); // 앵커 포인트 고정 로직
                    startHandleDist=startIntersect.distanceTo(worldAnchorPos);
                    dragTarget.userData.startOffset=currentEgg.userData.data.offsets[id].clone();
                } else startHandleDist=startIntersect.distanceTo(currentEgg.position);
                lastMouseAngle=getMouseAngle(e,currentEgg);
            } else if(currentSelection.length>1){
                const b=new THREE.Box3(); currentSelection.forEach(e=>{e.geometry.computeBoundingBox(); b.union(e.geometry.boundingBox.clone().applyMatrix4(e.matrixWorld));});
                const c=b.getCenter(new THREE.Vector3());
                startGroupData=currentSelection.map(e=>({pos:e.position.clone(),scale:e.userData.data.scale.clone(),rot:e.quaternion.clone()}));
                startHandleDist=startIntersect.distanceTo(c); lastMouseAngle=getMouseAngle(e,{position:c});
            } return;
        }

        const eh = ray.intersectObjects(scene.children.filter(o=>o.userData.isEgg));
        if(eh.length>0) {
            clearPatternStartSelection();
            dragTarget=eh[0].object; isDragging=true; mouseButton=e.button; controls.enabled=false;
            if(e.button===0 && !e.ctrlKey) updateSelectionVisuals([dragTarget]);
            else if(e.button===0 && e.ctrlKey) updateSelectionVisuals([...currentSelection, dragTarget]);
            const pl=new THREE.Plane(camera.getWorldDirection(new THREE.Vector3()).negate(), -dragTarget.position.dot(camera.getWorldDirection(new THREE.Vector3()).negate()));
            ray.ray.intersectPlane(pl, startIntersect);

        } else {
            clearPatternStartSelection();

                updateSelectionVisuals([]); controls.enabled=false;
            }
        }
    }

    // --- [ Move, Up, Render & Other Logic (Skipped but identical to 5.47/5.48) ] ---
    function onMove(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const m = new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1, -((e.clientY-rect.top)/rect.height)*2+1);
        const ray = new THREE.Raycaster(); ray.setFromCamera(m, camera);
        if(isPlacementMode){
            const h = ray.intersectObject(scene.children.find(o=>o.type==="GridHelper"));
            if(h.length>0){ ghostEgg.visible=true; ghostEgg.position.copy(h[0].point).y += 10.01; }
            else ghostEgg.visible=false;
        }
        if(isBoxSelecting){
            const x=Math.min(boxStart.x, e.clientX), y=Math.min(boxStart.y, e.clientY), w=Math.abs(e.clientX-boxStart.x), h=Math.abs(e.clientY-boxStart.y);
            selectBoxEl.style.left=x+'px'; selectBoxEl.style.top=y+'px'; selectBoxEl.style.width=w+'px'; selectBoxEl.style.height=h+'px'; return;
        }
        if(!isDragging || !dragTarget) return;
        const pl = new THREE.Plane(camera.getWorldDirection(new THREE.Vector3()).negate(), -dragTarget.position.dot(camera.getWorldDirection(new THREE.Vector3()).negate()));
        let intersect = new THREE.Vector3();
        if(ray.ray.intersectPlane(pl, intersect)){
            if(currentSelection.length>1 && currentSelection.includes(dragTarget) && mouseButton===0 && !dragTarget.userData.isHandle && !dragTarget.userData.isGroupHandle){
                currentSelection.forEach((eg,i)=>eg.position.copy(intersect).add(startGroupData[i].offset));
                updateGroupGizmoVisuals();
            } else if(currentEgg){
                if(dragTarget.userData.isRotationHandle){
                    const ang=getMouseAngle(e,currentEgg), da=ang-lastMouseAngle;
                    const ax=dragTarget.userData.axis==='x'?new THREE.Vector3(1,0,0):dragTarget.userData.axis==='y'?new THREE.Vector3(0,1,0):new THREE.Vector3(0,0,1);
                    currentEgg.quaternion.premultiply(new THREE.Quaternion().setFromAxisAngle(ax,-da)); lastMouseAngle=ang;
                } else if(dragTarget.userData.isEgg) dragTarget.position.copy(intersect);
                else if(dragTarget.userData.isHandle){
                    const id=dragTarget.userData.id, data=currentEgg.userData.data;
                    if(mouseButton===0 && e.ctrlKey){
                        const ld=intersect.clone().sub(startIntersect).applyQuaternion(currentEgg.quaternion.clone().invert());
                        data.offsets[id].copy(dragTarget.userData.startOffset).add(ld); updateMesh(currentEgg);
                    } else {
                        const r=Math.max(0.01, intersect.distanceTo(worldAnchorPos)/startHandleDist);
                        if(mouseButton===0) data.scale.copy(startScale).multiplyScalar(r);
                        else if(mouseButton===2){
                            const d=(id<2)?'y':(id<4?'x':'z'); data.scale.copy(startScale); data.scale[d]*=r;
                            const ctrls=[new THREE.Vector3(0,10,0),new THREE.Vector3(0,-10,0),new THREE.Vector3(-7,0,0),new THREE.Vector3(7,0,0),new THREE.Vector3(0,0,7),new THREE.Vector3(0,0,-7)], opp=(id%2===0)?id+1:id-1;
                            const co=ctrls[opp].clone().multiply(data.scale).applyQuaternion(currentEgg.quaternion).add(currentEgg.position);
                            currentEgg.position.add(worldAnchorPos.clone().sub(co));
                        } updateMesh(currentEgg);
                    }
                }
            } else if(currentSelection.length>1){
                const b=new THREE.Box3(); currentSelection.forEach(e=>{e.geometry.computeBoundingBox(); b.union(e.geometry.boundingBox.clone().applyMatrix4(e.matrixWorld));});
                const c=b.getCenter(new THREE.Vector3());
                if(dragTarget.userData.isGroupHandle){
                    const r=Math.max(0.01, intersect.distanceTo(c)/startHandleDist);
                    currentSelection.forEach((e,i)=>{e.userData.data.scale.copy(startGroupData[i].scale).multiplyScalar(r); updateMesh(e); e.position.copy(c).add(startGroupData[i].pos.clone().sub(c).multiplyScalar(r));});
                } else if(dragTarget.userData.isGroupRotationHandle){
                    const da=getMouseAngle(e,{position:c})-lastMouseAngle;
                    const ax=dragTarget.userData.axis==='x'?new THREE.Vector3(1,0,0):dragTarget.userData.axis==='y'?new THREE.Vector3(0,1,0):new THREE.Vector3(0,0,1);
                    const rq=new THREE.Quaternion().setFromAxisAngle(ax,-da);
                    currentSelection.forEach(eg=>{eg.position.sub(c).applyQuaternion(rq).add(c); eg.quaternion.premultiply(rq);});
                    lastMouseAngle+=da;
                } updateGroupGizmoVisuals();
            } updateRealTimeSize();
        }
    }

    function onUp(e) {
        if(isBoxSelecting){
            isBoxSelecting=false; selectBoxEl.style.display='none';
            const x1=Math.min(boxStart.x, e.clientX), y1=Math.min(boxStart.y, e.clientY), x2=Math.max(boxStart.x, e.clientX), y2=Math.max(boxStart.y, e.clientY);
            const rect=renderer.domElement.getBoundingClientRect(); const selected = [];
            scene.children.filter(o=>o.userData.isEgg).forEach(egg => {
                const sp = egg.position.clone().project(camera);
                const px = (sp.x + 1) * rect.width / 2 + rect.left, py = (-sp.y + 1) * rect.height / 2 + rect.top;
                if(px >= x1 && px <= x2 && py >= y1 && py <= y2) selected.push(egg);
            }); updateSelectionVisuals(selected);
        }
        if(isDragging) captureState(); isDragging=false; dragTarget=null; controls.enabled=true;
    }

    function updateGroupGizmoVisuals() {
        if(currentSelection.length<2) return;
        const b=new THREE.Box3(); currentSelection.forEach(e=>{e.geometry.computeBoundingBox(); b.union(e.geometry.boundingBox.clone().applyMatrix4(e.matrixWorld));});
        const c=b.getCenter(new THREE.Vector3()), s=b.getSize(new THREE.Vector3());
        const hb=new THREE.Mesh(new THREE.BoxGeometry(s.x,s.y,s.z)); hb.position.copy(c); groupGizmo.update(hb);

        groupHandles.forEach((h,i)=>h.position.copy(c).add(crn[i].clone().multiply(s)));
        groupRotHandles.forEach((r,i)=>{r.position.copy(c); r.rotation.set(0,0,0); if(i===0) r.rotateY(Math.PI/2); if(i===1) r.rotateX(Math.PI/2);});

    function createGhost() { ghostEgg=createEgg(0x28a745,true); ghostEgg.visible=false; scene.add(ghostEgg); }

    function captureState() {
        const s=scene.children.filter(o=>o.userData.isEgg).map(e=>({pos:{x:e.position.x,y:e.position.y,z:e.position.z},rot:{x:e.quaternion.x,y:e.quaternion.y,z:e.quaternion.z,w:e.quaternion.w},scale:{x:e.userData.data.scale.x,y:e.userData.data.scale.y,z:e.userData.data.scale.z},offsets:e.userData.data.offsets.map(o=>({x:o.x,y:o.y,z:o.z})),col:e.material.color.getHex()}));

    window.saveProject=()=>{const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([history[history.length-1]],{type:"application/json"})); a.download=`crochet_v5.48_${Date.now()}.json`; a.click();};

            handles.forEach((h,i)=>{ const lP=ctrls[i].clone().multiply(scale).add(offsets[i]).add(ctrls[i].clone().normalize().multiplyScalar(H_OFFSET)); h.position.copy(p).add(lP.applyQuaternion(q)); });
            [rotX_H, rotY_H, rotZ_H].forEach(r=>{r.position.copy(p); r.quaternion.copy(q); if(r===rotX_H) r.rotateY(Math.PI/2); if(r===rotY_H) r.rotateX(Math.PI/2);});
            updatePatternStartMarkers();
        }

/**
 * NEW: The missing Parser function
 */
function parsePatternText(text) {
    const lines = text.split('\n');
    let roundsData = [];
    const stitchRegex = /\((\d+)\)/; // Matches (12), (18) etc.

    lines.forEach((line, index) => {
        const match = line.match(stitchRegex);
        if (match && match[1]) {
            roundsData.push({ round: index + 1, stitches: parseInt(match[1]) });
        } else {
            // Fallback for "6sc" or "12 sc" style
            const scMatch = line.match(/(\d+)\s*sc/i);
            if (scMatch && scMatch[1]) {
                roundsData.push({ round: index + 1, stitches: parseInt(scMatch[1]) });
            }
        }
    });
    return roundsData;
}

/**
 * Creates a 3D shape based on the stitch counts.
 */
function createNewCrochetMesh(rounds, yarnMm) {
    const points = [];
    const heightStep = (yarnMm / 10) * 1.5;

    // 1. 포인트 생성 (엔진 규격에 맞게)
    points.push(new THREE.Vector2(0.001, 0));
    rounds.forEach((rd, index) => {
        const radius = (rd.stitches * yarnMm) / Math.PI / 2 / 10; 
        const yPos = (index + 1) * heightStep;
        points.push(new THREE.Vector2(radius, yPos));
    });
    points.push(new THREE.Vector2(0.001, (rounds.length + 1) * heightStep));

    // 2. 지오메트리 생성 및 중심점 보정 (핵심!)
    const geometry = new THREE.LatheGeometry(points, 32);
    
    // 엔진의 createEgg처럼 중심을 맞추기 위해 전체 높이의 절반만큼 내립니다.
    const totalH = (rounds.length + 1) * heightStep;
    geometry.translate(0, -totalH / 2, 0); 
    geometry.userData.origPos = geometry.attributes.position.clone();

    // 3. 메쉬 및 재질 설정
    const material = new THREE.MeshStandardMaterial({ 
        color: 0x6f42c1, 
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.9 
    });
    const newMesh = new THREE.Mesh(geometry, material);
    
    // 4. 엔진 표준 데이터 구조 (오프셋 6개 고정)
    newMesh.userData.isEgg = true;
    newMesh.userData.data = {
        scale: new THREE.Vector3(1, 1, 1),
        // 엔진은 핸들이 6개이므로 오프셋도 6개여야 합니다.
        offsets: [0,1,2,3,4,5].map(() => new THREE.Vector3(0, 0, 0))
    };

    scene.add(newMesh);

    // 5. 전역 변수 업데이트 및 즉시 갱신
    currentEgg = newMesh;
    currentSelection = [newMesh];

    if (typeof captureState === "function") captureState();
    
    // UI 치수 업데이트 함수 (코드 327번줄 참고)
    updateRealTimeSize(); 
    
    // 핸들 위치 재계산 및 표시
    if (typeof createHandles === "function") {
        updateSelectionVisuals([newMesh]); 
    }

    console.log("P2D Object successfully integrated into v5.49.2");
}

// 패턴 추출 보조 함수
function getPatternDataForLearning(targets, config) {
    const rounds = [];
    const step = config.roundH / 0.5; // CM_RATIO 반영
    // 실제 레이캐스팅 로직을 단순화하여 샘플 생성 (추후 아버님 엔진 로직과 완전 통합)
    for(let r=1; r<=20; r++) {
        rounds.push({rnd: r, desc: r===1?"Magic Ring":"sc around", sts: 6+(r*2)});
    }
    return rounds;
}

window.finalizeLearning = async (payload = {}) => {
    const notifyProgress = typeof payload.onProgress === "function" ? payload.onProgress : null;
    if (notifyProgress) notifyProgress(30, "Extracting learning signals...");
    const editedRounds = (Array.isArray(payload.editedRounds) ? payload.editedRounds : [])
        .filter(r => Number.isFinite(r.sts) && r.sts > 0 && String(r.desc || "").trim().length > 0)
        .map((r, i) => ({ rnd: i + 1, desc: String(r.desc || "").trim(), sts: Math.round(r.sts) }));
    if (!lastGenerationContext || !editedRounds.length) {
        const message = "학습할 데이터가 부족합니다. 패턴 생성 후 다시 시도해주세요.";
        if (notifyProgress) notifyProgress(100, message);
        return { ok: false, message };
    }

    const weightKey = lastGenerationContext.weightKey;
    const generatedMap = new Map(lastGenerationContext.generatedRounds.map(r => [r.rnd, r]));
    const widthRatios = [];

    editedRounds.forEach(er => {
        if (!Number.isFinite(er.sts) || er.sts <= 0) return;
        const gr = generatedMap.get(er.rnd);
        if (!gr || !Number.isFinite(gr.sts) || gr.sts <= 0) return;
        widthRatios.push(gr.sts / er.sts);
    });

    if (widthRatios.length > 0) {
        const avgRatio = widthRatios.reduce((a, b) => a + b, 0) / widthRatios.length;
        const current = learningState.stitchWidthByWeight[weightKey] || lastGenerationContext.stitchWidthCm;
        const defaultW = getDefaultStitchWidthCm(yarnWeights[weightKey] || { roundH: 0.38 });
        const target = current * avgRatio;
        const clamped = Math.max(defaultW * 0.55, Math.min(defaultW * 1.85, target));
        learningState.stitchWidthByWeight[weightKey] = (current * 0.8) + (clamped * 0.2);
    }

    if (notifyProgress) notifyProgress(65, "Learning stitch gauge...");

    learningState.samples.push({
        ts: Date.now(),
        weightKey,
        projectName: lastGenerationContext.projectName,
        signature: lastGenerationContext.signature,
        generated: lastGenerationContext.generatedRounds.slice(0, 120),
        corrected: editedRounds.slice(0, 120)
    });
    learningState.samples = learningState.samples.slice(-80);
    if (notifyProgress) notifyProgress(85, "Saving updates...");
    saveLearningState();

    const learnedWidth = learningState.stitchWidthByWeight[weightKey] || lastGenerationContext.stitchWidthCm;
    const resultMessage = `Learning complete. Stitch width=${learnedWidth.toFixed(3)}cm (deterministic core active).`;
    if (notifyProgress) notifyProgress(100, resultMessage);
    return { ok: true, message: resultMessage };
};
