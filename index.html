<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build-A-Crochet Workshop v5.2.0</title>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #ffffff; touch-action: none; display: flex; }
        
        /* v5.1.0 스타일 그대로 유지 */
        #item-panel {
            width: 80px; height: 100vh; background: #f9f9f9; border-right: 2px solid #ff69b4;
            display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 1000;
        }
        .item-box {
            width: 50px; height: 50px; background: #fff; border: 2px dashed #ccc; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 15px;
            transition: 0.2s;
        }
        .item-box:active { transform: scale(0.9); border-color: #ff69b4; }
        .item-label { font-size: 9px; color: #ff69b4; font-weight: bold; }
        .sphere-icon { width: 30px; height: 30px; background: #ff69b4; border-radius: 50%; } /* 색상을 분홍색으로 변경 (몸통용) */

        #canvas-container { flex-grow: 1; height: 100vh; position: relative; }
        #top-bar { 
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(255, 255, 255, 0.8); display: flex; align-items: center; 
            justify-content: center; z-index: 900; pointer-events: none;
        }
        #v-info { position: absolute; bottom: 10px; right: 10px; font-size: 9px; color: #ddd; }
    </style>
</head>
<body>

<div id="item-panel">
    <div class="item-label">LIBRARY</div>
    <div class="item-box" onclick="addBody()">
        <div class="sphere-icon"></div>
    </div>
    <div class="item-label">BODY (Egg)</div>
</div>

<div id="canvas-container">
    <div id="top-bar" style="font-weight: bold; color: #ff69b4; font-size: 12px;">Build-A-Crochet Workshop</div>
    <div id="v-info">v5.2.0 (Stable Base v4.4.4)</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls;
    let mainEgg; // 몸통(에그)을 담을 변수

    function init() {
        if (typeof THREE === 'undefined') { setTimeout(init, 100); return; }
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 80) / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 30, 60);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 80, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        let light = new THREE.PointLight(0xffffff, 1);
        light.position.set(20, 30, 20);
        scene.add(light);
        scene.add(new THREE.GridHelper(100, 20, 0xeeeeee, 0xf5f5f5));
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // [핵심 변경] 처음엔 createMainEgg()를 부르지 않음 -> 깨끗한 상태로 시작
        animate();
    }

    // [전진] BODY 버튼을 누를 때만 소환되는 함수
    window.addBody = function() {
        // 이미 몸통이 소환되어 있다면 또 만들지 않음 (중복 소환 방지)
        if (mainEgg) { alert("Body is already added!"); return; }

        const points = [];
        for (let i = 0; i <= 20; i++) {
            const t = i / 20;
            const y = (t - 0.5) * 26; // v4.4.4 높이 26 고정
            const r = (13.5 / 2) * Math.sqrt(Math.max(0, 1 - Math.pow(y / 13, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geometry = new THREE.LatheGeometry(points, 32);
        const material = new THREE.MeshPhongMaterial({ color: 0xff69b4, wireframe: true });
        mainEgg = new THREE.Mesh(geometry, material);
        
        // 소환 애니메이션 효과 (작게 시작해서 뿅!)
        mainEgg.scale.set(0.1, 0.1, 0.1); 
        scene.add(mainEgg);
        console.log("Body summoned! [v4.4.4 Logic applied]");
    }

    function animate() {
        requestAnimationFrame(animate);
        // 소환 애니메이션: 뿅! 하고 커지게
        if (mainEgg && mainEgg.scale.x < 1) {
            mainEgg.scale.x += 0.05;
            mainEgg.scale.y += 0.05;
            mainEgg.scale.z += 0.05;
        }
        if(controls) controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('load', init);
    window.onresize = function() {
        camera.aspect = (window.innerWidth - 80) / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth - 80, window.innerHeight);
    };
</script>
</body>
</html>
