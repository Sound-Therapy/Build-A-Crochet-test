<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v5.25.0 - Anchored Sculptor</title>
    <style>
        body { margin: 0; background-color: #ffffff; color: #111; overflow: hidden; display: flex; font-family: monospace; touch-action: none; }
        #panel { width: 80px; height: 100vh; background: #e0e0e0; border-right: 1px solid #ccc; display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100; }
        .btn { width: 50px; height: 50px; cursor: pointer; border: 2px solid #fff; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; border-radius: 8px; background: #eee; user-select: none; }
        .egg-btn { background: #ff69b4; border-radius: 50%; width: 40px; height: 50px; }
        .egg-btn.active { background: #28a745; box-shadow: 0 0 15px rgba(40,167,69,0.5); }
        .undo-btn { background: #333; color: white; }
        #canvas-container { flex-grow: 1; position: relative; }
        #v-tag { position: absolute; bottom: 15px; right: 20px; color: #444; font-size: 12px; font-weight: bold; pointer-events: none; }
        #palette { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 12px; display: none; grid-template-columns: repeat(2, 1fr); gap: 5px; border: 1px solid #ccc; }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="panel">
    <div class="btn undo-btn" onclick="executeUndo()">UNDO</div>
    <div id="egg-spawn-btn" class="btn egg-btn" onclick="togglePlacementMode()"></div>
    <div style="font-size: 9px; margin-top: -10px;">ADD EGG</div>
</div>

<div id="canvas-container">
    <div id="v-tag">Build-A-Crochet Engine v5.25.0</div>
    <div id="palette">
        <div class="color-dot" style="background: #ff69b4;" onclick="updateColor('#ff69b4')"></div>
        <div class="color-dot" style="background: #ffffff;" onclick="updateColor('#ffffff')"></div>
        <div class="color-dot" style="background: #000000;" onclick="updateColor('#000000')"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, currentEgg, ghostEgg;
    let isPlacementMode = false, dragTarget = null, isDragging = false;
    let rotX_H, rotY_H, rotZ_H, handles = [];
    let startScale, startPos, startRotation, mouseButton;
    
    let history = [];
    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const BASE_H = 20, BASE_R = 7, H_OFFSET = 7;

    function init() {
        scene = new THREE.Scene(); scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 80) / window.innerHeight, 0.1, 1000);
        camera.position.set(60, 50, 80);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 80, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

        scene.add(new THREE.GridHelper(100, 20, 0xcccccc, 0xeeeeee));
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6); dirLight.position.set(10, 20, 10); scene.add(dirLight);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: null };

        createHandles();
        createGhost();
        window.addEventListener('pointerdown', onDown);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        animate();
    }

    function createEgg(color, isGhost = false) {
        const points = []; for (let i = 0; i <= 20; i++) {
            const t = i / 20, y = t * BASE_H, r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((y - 10) / 10, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geo = new THREE.LatheGeometry(points, 32); geo.translate(0, -10, 0);
        geo.userData.origPos = geo.attributes.position.clone();
        const mat = new THREE.MeshPhongMaterial({ color, wireframe: true, transparent: true, opacity: isGhost ? 0.3 : 0.8 });
        const egg = new THREE.Mesh(geo, mat);
        if (!isGhost) {
            egg.userData.isEgg = true;
            // 💡 v5.25.0 핵심 데이터: Scale(전체) + Offsets(국소 변형)
            egg.userData.data = { scale: new THREE.Vector3(1, 1, 1), offsets: Array.from({length: 6}, () => new THREE.Vector3()) };
            const outline = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide }));
            outline.scale.set(1.02, 1.02, 1.02); egg.add(outline);
            egg.userData.outline = outline;
        }
        return egg;
    }

    function createGhost() { ghostEgg = createEgg(0x28a745, true); ghostEgg.visible = false; scene.add(ghostEgg); }

    function createHandles() {
        const makeH = (id, axis) => {
            const m = new THREE.Mesh(new THREE.SphereGeometry(1.8, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffcc00, depthTest: false }));
            m.renderOrder = 999; m.visible = false; m.userData = { isHandle: true, id, axis };
            scene.add(m); return m;
        };
        handles = [
            makeH(0, 'y'), makeH(1, 'y'), // Top(0), Bottom(1)
            makeH(2, 'x'), makeH(3, 'x'), // Left(2), Right(3)
            makeH(4, 'z'), makeH(5, 'z')  // Front(4), Back(5)
        ];
        const makeR = (col) => {
            const r = new THREE.Mesh(new THREE.TorusGeometry(20, 0.3, 16, 64), new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.4, depthTest: false }));
            r.renderOrder = 998; r.visible = false; scene.add(r); return r;
        };
        rotX_H = makeR(0xff0000); rotY_H = makeR(0x00ff00); rotZ_H = makeR(0x0000ff);
    }

    function selectEgg(egg) { currentEgg = egg; [...handles, rotX_H, rotY_H, rotZ_H].forEach(h => h.visible = true); document.getElementById('palette').style.display = 'grid'; }
    function deselectAll() { currentEgg = null; [...handles, rotX_H, rotY_H, rotZ_H].forEach(h => h.visible = false); document.getElementById('palette').style.display = 'none'; }
    window.updateColor = function(c) { if(currentEgg) { currentEgg.material.color.set(c); captureState(); } }

    function onDown(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster(); raycaster.setFromCamera(mouse, camera);
        if (isPlacementMode && e.button === 0) {
            let intersect = new THREE.Vector3(); if (raycaster.ray.intersectPlane(groundPlane, intersect)) spawnEgg(intersect); return;
        }
        const targets = [...handles, rotX_H, rotY_H, rotZ_H, ...scene.children.filter(o => o.userData.isEgg)];
        const hits = raycaster.intersectObjects(targets);
        if (hits.length > 0) {
            dragTarget = hits[0].object; controls.enabled = false; isDragging = true;
            if(dragTarget.userData.isEgg) selectEgg(dragTarget);
            startRotation = currentEgg.quaternion.clone(); startPos = currentEgg.position.clone();
            if(dragTarget.userData.isHandle) { mouseButton = e.button; startScale = currentEgg.userData.data.scale.clone(); }
            const sPos = dragTarget.position.clone().project(camera);
            startMouseAngle = Math.atan2(e.clientY - (rect.top + (1 - sPos.y) * rect.height / 2), e.clientX - (rect.left + (1 + sPos.x) * rect.width / 2));
        } else if (!e.target.classList.contains('color-dot')) deselectAll();
    }

    function onMove(e) {
        if (isPlacementMode) {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
            const raycaster = new THREE.Raycaster(); raycaster.setFromCamera(mouse, camera);
            let intersect = new THREE.Vector3(); if (raycaster.ray.intersectPlane(groundPlane, intersect)) { ghostEgg.position.copy(intersect).y += 10; ghostEgg.visible = true; }
            return;
        }
        if (!dragTarget || !currentEgg) return;
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster(); raycaster.setFromCamera(mouse, camera);

        if ([rotX_H, rotY_H, rotZ_H].includes(dragTarget)) {
            const sPos = dragTarget.position.clone().project(camera);
            const angle = Math.atan2(e.clientY - (rect.top + (1 - sPos.y) * rect.height / 2), e.clientX - (rect.left + (1 + sPos.x) * rect.width / 2));
            const axis = dragTarget === rotX_H ? new THREE.Vector3(1,0,0) : dragTarget === rotY_H ? new THREE.Vector3(0,1,0) : new THREE.Vector3(0,0,1);
            currentEgg.quaternion.multiplyQuaternions(startRotation, new THREE.Quaternion().setFromAxisAngle(axis, -(angle - startMouseAngle)));
        } else if (dragTarget.userData.isEgg) {
            const plane = new THREE.Plane(camera.getWorldDirection(new THREE.Vector3()).negate(), -startPos.dot(camera.getWorldDirection(new THREE.Vector3()).negate()));
            let intersect = new THREE.Vector3(); if (raycaster.ray.intersectPlane(plane, intersect)) currentEgg.position.copy(intersect);
        } else if (dragTarget.userData.isHandle) {
            const plane = new THREE.Plane(camera.getWorldDirection(new THREE.Vector3()).negate(), -dragTarget.position.dot(camera.getWorldDirection(new THREE.Vector3()).negate()));
            let intersect = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, intersect)) {
                const localDiff = intersect.sub(dragTarget.position).applyQuaternion(currentEgg.quaternion.clone().invert());
                const data = currentEgg.userData.data, id = dragTarget.userData.id;
                
                if (mouseButton === 0) { // 💡 좌클릭: 앵커 스케일링 (v5.21.0 로직)
                    if (id < 2) { // Y
                        const dir = id === 0 ? 1 : -1;
                        data.scale.y = Math.max(0.1, startScale.y + (localDiff.y * dir / BASE_H));
                        const move = (data.scale.y - startScale.y) * BASE_H / 2 * dir;
                        currentEgg.position.copy(startPos).add(new THREE.Vector3(0, move, 0).applyQuaternion(currentEgg.quaternion));
                    } else if (id < 4) { // X
                        const dir = id === 3 ? 1 : -1;
                        data.scale.x = Math.max(0.1, startScale.x + (localDiff.x * dir / BASE_R));
                        const move = (data.scale.x - startScale.x) * BASE_R / 2 * dir;
                        currentEgg.position.copy(startPos).add(new THREE.Vector3(move, 0, 0).applyQuaternion(currentEgg.quaternion));
                    } else { // Z
                        const dir = id === 4 ? 1 : -1;
                        data.scale.z = Math.max(0.1, startScale.z + (localDiff.z / BASE_R));
                        const move = (data.scale.z - startScale.z) * BASE_R / 2 * dir;
                        currentEgg.position.copy(startPos).add(new THREE.Vector3(0, 0, move).applyQuaternion(currentEgg.quaternion));
                    }
                } else if (mouseButton === 2) { // 💡 우클릭: 앵커 자유변형 (Sculpt)
                    data.offsets[id].add(localDiff);
                }
                updateMesh(currentEgg);
            }
        }
    }

    function updateMesh(egg) {
        const pos = egg.geometry.attributes.position, orig = egg.geometry.userData.origPos;
        const { scale, offsets } = egg.userData.data;
        const ctrls = [new THREE.Vector3(0,10,0), new THREE.Vector3(0,-10,0), new THREE.Vector3(-7,0,0), new THREE.Vector3(7,0,0), new THREE.Vector3(0,0,7), new THREE.Vector3(0,0,-7)];
        for (let i = 0; i < orig.count; i++) {
            const v = new THREE.Vector3(orig.getX(i), orig.getY(i), orig.getZ(i)), sV = v.clone().multiply(scale);
            let tw = 0; const sOff = new THREE.Vector3();
            for (let j = 0; j < 6; j++) {
                const w = 1 / Math.pow(v.distanceTo(ctrls[j]) + 1, 3.5); tw += w;
                sOff.add(offsets[j].clone().multiplyScalar(w));
            }
            const fV = sV.add(sOff.divideScalar(tw));
            pos.setXYZ(i, fV.x, fV.y, fV.z);
        }
        pos.needsUpdate = true;
        egg.userData.outline.geometry.attributes.position.copy(pos).needsUpdate = true;
    }

    function onUp() { if (isDragging) captureState(); isDragging = false; dragTarget = null; controls.enabled = true; }
    function captureState() { /* History logic */ }
    function togglePlacementMode() { isPlacementMode = !isPlacementMode; ghostEgg.visible = isPlacementMode; document.getElementById('egg-spawn-btn').classList.toggle('active', isPlacementMode); }
    function spawnEgg(pos) { const egg = createEgg(0xff69b4); egg.position.copy(pos).y += 10; scene.add(egg); selectEgg(egg); togglePlacementMode(); }

    function animate() {
        requestAnimationFrame(animate);
        if (currentEgg) {
            const { scale, offsets } = currentEgg.userData.data, p = currentEgg.position, q = currentEgg.quaternion;
            const ctrls = [new THREE.Vector3(0,10,0), new THREE.Vector3(0,-10,0), new THREE.Vector3(-7,0,0), new THREE.Vector3(7,0,0), new THREE.Vector3(0,0,7), new THREE.Vector3(0,0,-7)];
            handles.forEach((h, i) => {
                const lP = ctrls[i].clone().multiply(scale).add(offsets[i]).add(ctrls[i].clone().normalize().multiplyScalar(H_OFFSET));
                h.position.copy(p).add(lP.applyQuaternion(q));
            });
            [rotX_H, rotY_H, rotZ_H].forEach(r => { r.position.copy(p); r.quaternion.copy(q); if(r===rotX_H) r.rotateY(Math.PI/2); if(r===rotY_H) r.rotateX(Math.PI/2); });
        }
        renderer.render(scene, camera); controls.update();
    }
    window.onload = init;
</script>
</body>
</html>
