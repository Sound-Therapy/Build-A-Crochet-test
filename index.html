<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v5.6.4</title>
    <style>
        body { margin: 0; background-color: #111; color: #0f0; overflow: hidden; display: flex; font-family: monospace; touch-action: none; }
        #panel { width: 80px; height: 100vh; background: #222; border-right: 1px solid #444; display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100; }
        .btn { width: 50px; height: 50px; background: #ff69b4; border: 2px solid #fff; border-radius: 10px; cursor: pointer; box-shadow: 0 0 10px rgba(255,105,180,0.5); }
        #canvas-container { flex-grow: 1; position: relative; background: #000; }
        #status-display { position: absolute; top: 10px; left: 10px; z-index: 200; pointer-events: none; }
        #v-tag { position: absolute; bottom: 10px; right: 10px; color: #555; font-size: 12px; }
    </style>
</head>
<body>

<div id="panel">
    <button class="btn" onclick="handleSpawn()"></button>
    <div style="font-size: 10px; margin-top: 5px; color: #ccc;">ADD EGG</div>
</div>

<div id="canvas-container">
    <div id="status-display">System Ready. Click Pink Button.</div>
    <div id="v-tag">v5.6.4 (One-side Horizontal Scale)</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, egg, topH, bottomH, moveH, rightH;
    let dragTarget = null;
    let prevX = 0, prevY = 0;
    const BASE_H = 20, BASE_R = 7;
    const status = document.getElementById('status-display');

    function init() {
        try {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);
            
            camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 80) / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 30, 70); // Front view

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 80, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.GridHelper(100, 20, 0x444444, 0x222222));
            scene.add(new THREE.AmbientLight(0xffffff, 1));
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.rotateSpeed = 0.5;

            window.addEventListener('pointerdown', onDown);
            window.addEventListener('pointermove', onMove);
            window.addEventListener('pointerup', onUp);
            
            animate();
        } catch (e) { status.innerText = "Init Error: " + e.message; }
    }

    window.handleSpawn = function() {
        if (egg) return;
        const points = [];
        for (let i = 0; i <= 20; i++) {
            const t = i / 20;
            const y = t * BASE_H;
            const r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((y - 10) / 10, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geo = new THREE.LatheGeometry(points, 32);
        const mat = new THREE.MeshPhongMaterial({ color: 0xff69b4, wireframe: true, transparent: true, opacity: 0.8 });
        egg = new THREE.Mesh(geo, mat);
        scene.add(egg);

        const hGeo = new THREE.SphereGeometry(1.2, 16, 16);
        topH = new THREE.Mesh(hGeo, new THREE.MeshBasicMaterial({ color: 0x007bff })); // Dark Blue
        bottomH = new THREE.Mesh(hGeo, new THREE.MeshBasicMaterial({ color: 0x00d4ff })); // Light Blue
        moveH = new THREE.Mesh(hGeo, new THREE.MeshBasicMaterial({ color: 0x28a745 })); // Green
        rightH = new THREE.Mesh(hGeo, new THREE.MeshBasicMaterial({ color: 0x0056b3 })); // Deep Blue

        [topH, bottomH, moveH, rightH].forEach(h => { h.visible = false; scene.add(h); });
        status.innerText = "Egg Active. Click Egg to Edit.";
    };

    function onDown(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);

        if (egg) {
            const hits = raycaster.intersectObjects([topH, bottomH, moveH, rightH, egg].filter(o => o && (o.visible || o === egg)));
            if (hits.length > 0) {
                const obj = hits[0].object;
                if (obj === egg) { [topH, bottomH, moveH, rightH].forEach(h => h.visible = true); }
                else { dragTarget = obj; controls.enabled = false; prevX = e.clientX; prevY = e.clientY; }
            } else { [topH, bottomH, moveH, rightH].forEach(h => h.visible = false); }
        }
    }

    function onMove(e) {
        if (!dragTarget || !egg) return;
        const dx = e.clientX - prevX;
        const dy = prevY - e.clientY;
        prevX = e.clientX; prevY = e.clientY;

        if (dragTarget === moveH) egg.position.y += dy * 0.1;
        else if (dragTarget === topH) egg.scale.y = Math.max(0.1, egg.scale.y + dy * 0.01);
        else if (dragTarget === bottomH) {
            const oldS = egg.scale.y;
            egg.scale.y = Math.max(0.1, oldS - dy * 0.01);
            egg.position.y -= (egg.scale.y - oldS) * BASE_H;
        } else if (dragTarget === rightH) {
            const oldS = egg.scale.x;
            const newS = Math.max(0.1, oldS + dx * 0.02);
            const scaleDiff = newS - oldS;

            // 스케일을 적용
            egg.scale.x = newS;
            // 💡 핵심 보정식: 오른쪽으로 늘어나는 만큼 위치(X)를 절반만큼 오른쪽으로 이동시켜 왼쪽 좌표를 고정함
            egg.position.x += scaleDiff * (BASE_R / 2);
        }
    }

    function onUp() { dragTarget = null; controls.enabled = true; }

    function animate() {
        requestAnimationFrame(animate);
        if (egg && topH) {
            const curH = BASE_H * egg.scale.y, curR = BASE_R * egg.scale.x;
            const bY = egg.position.y, tY = bY + curH, cX = egg.position.x;
            topH.position.set(cX, tY, egg.position.z);
            moveH.position.set(cX, tY + 4, egg.position.z);
            bottomH.position.set(cX, bY, egg.position.z);
            // 오른쪽 핸들을 X축 끝점에 동기화
            rightH.position.set(cX + curR, bY + (curH / 2), egg.position.z);
        }
        renderer.render(scene, camera);
        controls.update();
    }

    window.onload = init;
</script>
</body>
</html>
