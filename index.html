<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v5.10.0</title>
    <style>
        body { margin: 0; background-color: #ffffff; color: #111; overflow: hidden; display: flex; font-family: monospace; touch-action: none; }
        #panel { width: 80px; height: 100vh; background: #e0e0e0; border-right: 1px solid #ccc; display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100; }
        .egg-btn { width: 40px; height: 50px; background: #ff69b4; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; cursor: pointer; border: 2px solid #fff; position: relative; }
        .egg-btn.active { background: #28a745; box-shadow: 0 0 15px rgba(40,167,69,0.6); }
        .egg-btn.active::after { content: 'ON'; position: absolute; top: 10px; left: 10px; color: #fff; font-weight: bold; font-size: 10px; }
        #canvas-container { flex-grow: 1; position: relative; }
        #v-tag { position: absolute; bottom: 15px; right: 20px; color: #444; font-size: 12px; font-weight: bold; }
        #palette { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(255,255,255,0.9); padding: 12px; border-radius: 15px; 
            display: none; grid-template-columns: repeat(7, 1fr); gap: 10px; 
            border: 1px solid #ccc; z-index: 300; box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        .color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="panel">
    <div id="egg-spawn-btn" class="egg-btn" onclick="togglePlacementMode()"></div>
    <div style="font-size: 10px; margin-top: 8px; color: #333; text-align: center; font-weight: bold;">ADD EGG</div>
</div>

<div id="canvas-container">
    <div id="v-tag">Build-A-Crochet Engine v5.10.0</div>
    <div id="palette">
        <div class="color-dot" style="background: #ff69b4;" onclick="changeColor('#ff69b4')"></div>
        <div class="color-dot" style="background: #e91e63;" onclick="changeColor('#e91e63')"></div>
        <div class="color-dot" style="background: #9c27b0;" onclick="changeColor('#9c27b0')"></div>
        <div class="color-dot" style="background: #673ab7;" onclick="changeColor('#673ab7')"></div>
        <div class="color-dot" style="background: #3f51b5;" onclick="changeColor('#3f51b5')"></div>
        <div class="color-dot" style="background: #2196f3;" onclick="changeColor('#2196f3')"></div>
        <div class="color-dot" style="background: #00bcd4;" onclick="changeColor('#00bcd4')"></div>
        <div class="color-dot" style="background: #4caf50;" onclick="changeColor('#4caf50')"></div>
        <div class="color-dot" style="background: #ffeb3b;" onclick="changeColor('#ffeb3b')"></div>
        <div class="color-dot" style="background: #ff9800;" onclick="changeColor('#ff9800')"></div>
        <div class="color-dot" style="background: #ff5722;" onclick="changeColor('#ff5722')"></div>
        <div class="color-dot" style="background: #795548;" onclick="changeColor('#795548')"></div>
        <div class="color-dot" style="background: #ffffff; border: 1px solid #ccc;" onclick="changeColor('#ffffff')"></div>
        <div class="color-dot" style="background: #000000;" onclick="changeColor('#000000')"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, currentEgg, ghostEgg;
    let isPlacementMode = false, dragTarget = null;
    let moveV, moveX, moveZ, rotX_H, rotY_H, rotZ_H;
    let startRotation = new THREE.Quaternion(), startMouseAngle = 0;
    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const BASE_H = 20, BASE_R = 7;

    function init() {
        scene = new THREE.Scene(); scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 80) / window.innerHeight, 0.1, 1000);
        camera.position.set(60, 50, 80);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 80, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        scene.add(new THREE.GridHelper(100, 20, 0xcccccc, 0xeeeeee));
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        createGhost(); createHandles();
        window.addEventListener('pointerdown', onDown);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', () => { dragTarget = null; controls.enabled = true; });
        window.addEventListener('keydown', (e) => { if ((e.key === 'Delete' || e.key === 'Backspace') && currentEgg) { scene.remove(currentEgg); deselectAll(); } });
        animate();
    }

    function createGhost() {
        const points = []; for (let i = 0; i <= 20; i++) {
            const t = i / 20; const y = t * BASE_H;
            const r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((y - 10) / 10, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geo = new THREE.LatheGeometry(points, 32); geo.translate(0, -10, 0);
        ghostEgg = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x28a745, transparent: true, opacity: 0.3, wireframe: true }));
        ghostEgg.visible = false; scene.add(ghostEgg);
    }

    window.togglePlacementMode = function() {
        isPlacementMode = !isPlacementMode;
        document.getElementById('egg-spawn-btn').classList.toggle('active', isPlacementMode);
        ghostEgg.visible = isPlacementMode;
        if(isPlacementMode) deselectAll();
    }

    function spawnEgg(pos) {
        const points = []; for (let i = 0; i <= 20; i++) {
            const t = i / 20; const y = t * BASE_H;
            const r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((y - 10) / 10, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geo = new THREE.LatheGeometry(points, 32); geo.translate(0, -10, 0);
        const egg = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: 0xff69b4, wireframe: true, transparent: true, opacity: 0.7 }));
        egg.position.copy(pos); egg.position.y += 10; egg.userData.isEgg = true;
        scene.add(egg);
        const outline = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide }));
        outline.scale.set(1.02, 1.02, 1.02); egg.add(outline);
        selectEgg(egg); togglePlacementMode();
    }

    function createHandles() {
        const hGeo = new THREE.SphereGeometry(1.3, 16, 16);
        const makeH = (col) => { const m = new THREE.Mesh(hGeo, new THREE.MeshBasicMaterial({ color: col })); m.visible = false; scene.add(m); return m; };
        moveV = makeH(0x28a745); moveX = makeH(0xff0000); moveZ = makeH(0x0000ff);
        const createRing = (axis, color) => {
            const g = new THREE.TorusGeometry(22, 0.2, 16, 64);
            const r = new THREE.Mesh(g, new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.4 }));
            r.visible = false; scene.add(r); return r;
        };
        rotX_H = createRing('x', 0xff0000); rotY_H = createRing('y', 0x00ff00); rotZ_H = createRing('z', 0x0000ff);
    }

    function selectEgg(egg) { currentEgg = egg; [moveV, moveX, moveZ, rotX_H, rotY_H, rotZ_H].forEach(h => h.visible = true); document.getElementById('palette').style.display = 'grid'; }
    function deselectAll() { currentEgg = null; [moveV, moveX, moveZ, rotX_H, rotY_H, rotZ_H].forEach(h => { if(h) h.visible = false; }); document.getElementById('palette').style.display = 'none'; }
    window.changeColor = function(c) { if(currentEgg) currentEgg.material.color.set(c); }

    function onDown(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster(); raycaster.setFromCamera(mouse, camera);

        if (isPlacementMode && e.button === 0) {
            let intersect = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(groundPlane, intersect)) { spawnEgg(intersect); return; }
        }

        const interactables = [moveV, moveX, moveZ, rotX_H, rotY_H, rotZ_H];
        const hits = raycaster.intersectObjects(scene.children.filter(o => o.visible && (o.userData.isEgg || interactables.includes(o))));
        
        if (hits.length > 0) {
            const obj = hits[0].object;
            if (interactables.includes(obj)) {
                dragTarget = obj; controls.enabled = false;
                startRotation.copy(currentEgg.quaternion);
                const screenPos = dragTarget.position.clone().project(camera);
                const centerX = rect.left + (1 + screenPos.x) * rect.width / 2;
                const centerY = rect.top + (1 - screenPos.y) * rect.height / 2;
                startMouseAngle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
            } else { selectEgg(obj); }
        } else if (!e.target.classList.contains('color-dot')) { deselectAll(); }
    }

    function onMove(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        if (isPlacementMode) {
            const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
            const raycaster = new THREE.Raycaster(); raycaster.setFromCamera(mouse, camera);
            let intersect = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(groundPlane, intersect)) { ghostEgg.position.copy(intersect); ghostEgg.position.y += 10; }
            return;
        }

        if (!dragTarget || !currentEgg) return;

        if ([rotX_H, rotY_H, rotZ_H].includes(dragTarget)) {
            const screenPos = dragTarget.position.clone().project(camera);
            const centerX = rect.left + (1 + screenPos.x) * rect.width / 2;
            const centerY = rect.top + (1 - screenPos.y) * rect.height / 2;
            const currentAngle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
            let deltaAngle = currentAngle - startMouseAngle;

            const localAxis = new THREE.Vector3();
            if (dragTarget === rotX_H) localAxis.set(1, 0, 0);
            else if (dragTarget === rotY_H) localAxis.set(0, 1, 0);
            else if (dragTarget === rotZ_H) localAxis.set(0, 0, 1);

            const worldAxis = localAxis.clone().applyQuaternion(currentEgg.quaternion);
            const camDir = new THREE.Vector3();
            camera.getWorldDirection(camDir);
            
            if (worldAxis.dot(camDir) > 0) deltaAngle *= -1;

            const q = new THREE.Quaternion().setFromAxisAngle(localAxis, -deltaAngle);
            currentEgg.quaternion.multiplyQuaternions(startRotation, q);
        } else {
            const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
            const raycaster = new THREE.Raycaster(); raycaster.setFromCamera(mouse, camera);
            let intersect = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(new THREE.Plane(camera.getWorldDirection(new THREE.Vector3()).negate(), -currentEgg.position.dot(camera.getWorldDirection(new THREE.Vector3()).negate())), intersect)) {
                if (dragTarget === moveV) currentEgg.position.y = intersect.y;
                if (dragTarget === moveX) currentEgg.position.x = intersect.x;
                if (dragTarget === moveZ) currentEgg.position.z = intersect.z;
            }
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        if (currentEgg && moveV) {
            const p = currentEgg.position;
            moveV.position.set(p.x, p.y + 15, p.z);
            moveX.position.set(p.x + 15, p.y, p.z);
            moveZ.position.set(p.x, p.y, p.z + 15);
            [rotX_H, rotY_H, rotZ_H].forEach(r => {
                r.position.copy(p); r.quaternion.copy(currentEgg.quaternion);
                if (r === rotX_H) r.rotateY(Math.PI / 2);
                if (r === rotY_H) r.rotateX(Math.PI / 2);
            });
        }
        renderer.render(scene, camera); controls.update();
    }
    window.onload = init;
</script>
</body>
</html>
