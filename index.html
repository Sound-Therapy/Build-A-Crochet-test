<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build-A-Crochet v5.4.4</title>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #ffffff; touch-action: none; display: flex; }
        #item-panel {
            width: 80px; height: 100vh; background: #f9f9f9; border-right: 2px solid #ff69b4;
            display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 1000;
        }
        .item-box {
            width: 50px; height: 50px; background: #fff; border: 2px dashed #ccc; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 15px;
        }
        .sphere-icon { width: 30px; height: 30px; background: #ff69b4; border-radius: 50%; }
        .item-label { font-size: 9px; color: #ff69b4; font-weight: bold; }
        #canvas-container { flex-grow: 1; height: 100vh; position: relative; }
        #v-info { position: absolute; bottom: 10px; right: 10px; font-size: 9px; color: #ddd; }
    </style>
</head>
<body>

<div id="item-panel">
    <div class="item-label">LIBRARY</div>
    <div class="item-box" onclick="addBody()">
        <div class="sphere-icon"></div>
    </div>
    <div class="item-label">BODY (Egg)</div>
</div>

<div id="canvas-container">
    <div id="v-info">v5.4.4 (Hard-Coded Bottom 0)</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, mainEgg;
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();
    let handles = [];

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 80) / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 30, 60);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 80, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        let light = new THREE.DirectionalLight(0xffffff, 0.6);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.GridHelper(100, 20, 0xeeeeee, 0xf5f5f5));
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        window.addEventListener('pointerdown', onPointerDown);
        
        animate();
    }

    window.addBody = function() {
        if (mainEgg) return;

        const points = [];
        const height = 26;
        const radius = 13.5 / 2;

        // 0부터 height까지 점을 직접 생성 (바닥 고정 수학식)
        for (let i = 0; i <= 20; i++) {
            const t = i / 20;
            const y = t * height; 
            // 구 형태를 유지하되 y축 이동량이 0~26이 되도록 보정
            const r = radius * Math.sqrt(Math.max(0, 1 - Math.pow((y - 13) / 13, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        
        const geometry = new THREE.LatheGeometry(points, 32);
        const material = new THREE.MeshPhongMaterial({ color: 0xff69b4, wireframe: true });
        mainEgg = new THREE.Mesh(geometry, material);
        
        scene.add(mainEgg);
        createHandles();
        setHandlesVisible(false);
    }

    function createHandles() {
        const handleGeo = new THREE.SphereGeometry(0.8, 16, 16);
        const handleMat = new THREE.MeshBasicMaterial({ color: 0x007bff });

        // 명확한 위치값 설정
        const positions = [
            [0, 26, 0],  // Top
            [0, 0, 0],   // Bottom
            [8, 13, 0],  // Right
            [-8, 13, 0]  // Left
        ];

        positions.forEach(pos => {
            const h = new THREE.Mesh(handleGeo, handleMat);
            h.position.set(...pos);
            mainEgg.add(h); 
            handles.push(h);
        });
    }

    function setHandlesVisible(visible) {
        handles.forEach(h => h.visible = visible);
    }

    function onPointerDown(event) {
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(mainEgg);

        if (intersects.length > 0) {
            setHandlesVisible(true);
        } else {
            setHandlesVisible(false);
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        if(controls) controls.update();
        renderer.render(scene, camera);
    }

    window.onload = init;
</script>
</body>
</html>
