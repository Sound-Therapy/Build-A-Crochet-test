<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v5.21.0 - Minimal Sculptor</title>
    <style>
        body { margin: 0; background-color: #ffffff; color: #111; overflow: hidden; display: flex; font-family: monospace; touch-action: none; }
        #panel { width: 80px; height: 100vh; background: #e0e0e0; border-right: 1px solid #ccc; display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100; }
        .btn { width: 50px; height: 50px; cursor: pointer; border: 2px solid #fff; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; border-radius: 8px; background: #eee; user-select: none; }
        .egg-btn { background: #ff69b4; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; }
        .egg-btn.active { background: #28a745; box-shadow: 0 0 20px rgba(40,167,69,0.8); }
        .undo-btn { background: #333; color: white; }
        #canvas-container { flex-grow: 1; position: relative; }
        #v-tag { position: absolute; bottom: 15px; right: 20px; color: #444; font-size: 12px; font-weight: bold; pointer-events: none; }
        #palette { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.9); padding: 12px; border-radius: 15px; display: none; grid-template-columns: repeat(2, 1fr); gap: 8px; border: 1px solid #ccc; z-index: 300; max-height: 80vh; overflow-y: auto; }
        .color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(0,0,0,0.1); transition: transform 0.1s; }
        .color-dot:hover { transform: scale(1.1); border-color: #555; }
    </style>
</head>
<body>

<div id="panel">
    <div class="btn undo-btn" onclick="executeUndo()">UNDO</div>
    <div id="egg-spawn-btn" class="btn egg-btn" onclick="togglePlacementMode()"></div>
    <div style="font-size: 9px; color: #333; text-align: center;">ADD EGG</div>
</div>

<div id="canvas-container">
    <div id="v-tag">Build-A-Crochet Engine v5.21.0</div>
    <div id="palette">
        <div class="color-dot" style="background: #ff69b4;" onclick="updateColor('#ff69b4')"></div>
        <div class="color-dot" style="background: #ff1493;" onclick="updateColor('#ff1493')"></div>
        <div class="color-dot" style="background: #9c27b0;" onclick="updateColor('#9c27b0')"></div>
        <div class="color-dot" style="background: #673ab7;" onclick="updateColor('#673ab7')"></div>
        <div class="color-dot" style="background: #ffffff;" onclick="updateColor('#ffffff')"></div>
        <div class="color-dot" style="background: #000000;" onclick="updateColor('#000000')"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, currentEgg, ghostEgg;
    let isPlacementMode = false, dragTarget = null, isDragging = false;
    // Movement handles (moveV, etc.) are removed
    let rotX_H, rotY_H, rotZ_H;
    let topH, bottomH, leftH, rightH, frontH, backH;
    
    let history = [];
    const MAX_HISTORY = 50;
    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const BASE_H = 20, BASE_R = 7;
    // 💡 크기 조절 점들을 물체에서 띄울 거리
    const HANDLE_OFFSET = 5; 

    function init() {
        scene = new THREE.Scene(); scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 80) / window.innerHeight, 0.1, 1000);
        camera.position.set(60, 50, 80);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 80, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        scene.add(new THREE.GridHelper(100, 20, 0xcccccc, 0xeeeeee));
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        
        createHandles();
        createGhost();

        window.addEventListener('pointerdown', onDown);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        
        animate();
    }

    function createEggMesh(color, isGhost = false) {
        const points = []; for (let i = 0; i <= 20; i++) {
            const t = i / 20; const y = t * BASE_H;
            const r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((y - 10) / 10, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geo = new THREE.LatheGeometry(points, 32); geo.translate(0, -10, 0);
        const mat = new THREE.MeshPhongMaterial({ color: color, wireframe: true, transparent: true, opacity: isGhost ? 0.3 : 0.8, depthWrite: !isGhost });
        const egg = new THREE.Mesh(geo, mat);
        if (!isGhost) {
            egg.userData.isEgg = true;
            const outline = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide }));
            outline.scale.set(1.02, 1.02, 1.02); egg.add(outline);
        }
        return egg;
    }

    function createGhost() {
        ghostEgg = createEggMesh(0x28a745, true); 
        ghostEgg.visible = false; ghostEgg.renderOrder = 1000;
        scene.add(ghostEgg);
    }

    function captureState() {
        const eggs = scene.children.filter(o => o.userData.isEgg);
        const state = eggs.map(egg => ({
            pos: { x: egg.position.x, y: egg.position.y, z: egg.position.z },
            rot: { x: egg.quaternion.x, y: egg.quaternion.y, z: egg.quaternion.z, w: egg.quaternion.w },
            scl: { x: egg.scale.x, y: egg.scale.y, z: egg.scale.z },
            col: egg.material.color.getHex()
        }));
        const json = JSON.stringify(state);
        if (history.length > 0 && history[history.length - 1] === json) return;
        history.push(json);
        if (history.length > MAX_HISTORY) history.shift();
    }

    window.executeUndo = function() {
        if (history.length <= 1) {
            if (history.length === 1) applyState(JSON.parse(history[0]));
            return;
        }
        history.pop(); applyState(JSON.parse(history[history.length - 1]));
    };

    function applyState(stateData) {
        scene.children.filter(o => o.userData.isEgg).forEach(o => { o.geometry.dispose(); o.material.dispose(); scene.remove(o); });
        stateData.forEach(d => {
            const egg = createEggMesh(new THREE.Color(d.col));
            egg.position.set(d.pos.x, d.pos.y, d.pos.z); egg.quaternion.set(d.rot.x, d.rot.y, d.rot.z, d.rot.w); egg.scale.set(d.scl.x, d.scl.y, d.scl.z);
            scene.add(egg);
        });
        deselectAll();
    }

    window.togglePlacementMode = function() {
        isPlacementMode = !isPlacementMode;
        document.getElementById('egg-spawn-btn').classList.toggle('active', isPlacementMode);
        ghostEgg.visible = isPlacementMode;
    }

    function spawnEgg(pos) {
        const egg = createEggMesh(0xff69b4);
        egg.position.copy(pos); egg.position.y += 10;
        scene.add(egg);
        captureState(); selectEgg(egg); togglePlacementMode();
    }

    function createHandles() {
        const makeH = (col) => { 
            // 💡 크기 조절 점 구체 크기를 살짝 키움 (가시성)
            const m = new THREE.Mesh(new THREE.SphereGeometry(1.8, 16, 16), new THREE.MeshBasicMaterial({ color: col, depthTest: false })); 
            m.renderOrder = 999; m.visible = false; scene.add(m); return m; 
        };
        // Movement handles removed
        // Scale handles remain, will be positioned with offset
        topH = makeH(0x007bff); bottomH = makeH(0x00d4ff); leftH = makeH(0xffff00); rightH = makeH(0xffa500); frontH = makeH(0xff00ff); backH = makeH(0x00ffff);
        
        const createRing = (color) => {
            const r = new THREE.Mesh(new THREE.TorusGeometry(22, 0.4, 16, 64), new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.5, depthTest: false }));
            r.renderOrder = 998; r.visible = false; scene.add(r); return r;
        };
        rotX_H = createRing(0xff0000); rotY_H = createRing(0x00ff00); rotZ_H = createRing(0x0000ff);
    }

    function selectEgg(egg) { 
        currentEgg = egg; 
        [rotX_H, rotY_H, rotZ_H, topH, bottomH, leftH, rightH, frontH, backH].forEach(h => h.visible = true); 
        document.getElementById('palette').style.display = 'grid'; 
    }
    
    function deselectAll() { 
        currentEgg = null; 
        [rotX_H, rotY_H, rotZ_H, topH, bottomH, leftH, rightH, frontH, backH].forEach(h => { if(h) h.visible = false; }); 
        document.getElementById('palette').style.display = 'none'; 
    }

    window.updateColor = function(c) { if(currentEgg) { currentEgg.material.color.set(c); captureState(); } }

    function onDown(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster(); raycaster.setFromCamera(mouse, camera);

        if (isPlacementMode && e.button === 0) {
            let intersect = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(groundPlane, intersect)) { spawnEgg(intersect); return; }
        }

        const interactables = [rotX_H, rotY_H, rotZ_H, topH, bottomH, leftH, rightH, frontH, backH];
        const eggs = scene.children.filter(o => o.userData.isEgg);
        const hits = raycaster.intersectObjects([...interactables, ...eggs]);
        
        if (hits.length > 0) {
            const obj = hits[0].object;
            // 💡 드래그 대상 설정: 크기 점, 회전 링, 혹은 에그 몸체
            if (interactables.includes(obj) || obj.userData.isEgg) {
                dragTarget = obj; controls.enabled = false; isDragging = true;
                // 에그 몸체 클릭 시 선택
                if(obj.userData.isEgg) selectEgg(obj);
                
                startRotation = currentEgg.quaternion.clone(); 
                startScale = currentEgg.scale.clone(); 
                startPos = currentEgg.position.clone();
                
                // 화면 기준 좌표 계산 (이동/회전용)
                const targetForScreen = obj.userData.isEgg ? obj : obj; // Reference object for screen projection
                const screenPos = targetForScreen.position.clone().project(camera);
                startMouseAngle = Math.atan2(e.clientY - (rect.top + (1 - screenPos.y) * rect.height / 2), e.clientX - (rect.left + (1 + screenPos.x) * rect.width / 2));
            }
        } else if (!e.target.classList.contains('color-dot') && !e.target.classList.contains('btn')) { deselectAll(); }
    }

    function onMove(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster(); raycaster.setFromCamera(mouse, camera);

        if (isPlacementMode) {
            let intersect = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(groundPlane, intersect)) { ghostEgg.position.copy(intersect); ghostEgg.position.y += 10; ghostEgg.visible = true; }
            return;
        }
        if (!dragTarget || !currentEgg) return;

        // 회전 조작
        if ([rotX_H, rotY_H, rotZ_H].includes(dragTarget)) {
            const screenPos = dragTarget.position.clone().project(camera);
            const currentAngle = Math.atan2(e.clientY - (rect.top + (1 - screenPos.y) * rect.height / 2), e.clientX - (rect.left + (1 + screenPos.x) * rect.width / 2));
            let deltaAngle = currentAngle - startMouseAngle;
            const axis = new THREE.Vector3();
            if (dragTarget === rotX_H) axis.set(1, 0, 0); else if (dragTarget === rotY_H) axis.set(0, 1, 0); else axis.set(0, 0, 1);
            if (axis.clone().applyQuaternion(currentEgg.quaternion).dot(camera.getWorldDirection(new THREE.Vector3()).negate()) < 0) deltaAngle *= -1;
            currentEgg.quaternion.multiplyQuaternions(startRotation, new THREE.Quaternion().setFromAxisAngle(axis, -deltaAngle));
        } 
        // 💡 에그 몸체 드래그 이동 (자유 이동)
        else if (dragTarget.userData.isEgg) {
            let intersect = new THREE.Vector3();
            // 카메라 시점에 수직인 평면 생성
            const planeNormal = camera.getWorldDirection(new THREE.Vector3()).negate();
            const plane = new THREE.Plane(planeNormal, -startPos.dot(planeNormal));
            if (raycaster.ray.intersectPlane(plane, intersect)) {
                // 시작점에서의 오프셋만큼 이동 (드래그 시작점 유지)
                currentEgg.position.copy(intersect); 
            }
        }
        // 크기 조절 조작
        else {
            let intersect = new THREE.Vector3();
            // 카메라 시점 평면 감지
            const planeNormal = camera.getWorldDirection(new THREE.Vector3()).negate();
            const plane = new THREE.Plane(planeNormal, -dragTarget.position.dot(planeNormal));
            if (raycaster.ray.intersectPlane(plane, intersect)) {
                // 핸들 시작점 대비 이동량
                const diff = intersect.clone().sub(dragTarget.position);
                // 로컬 좌표로 변환
                const localDiff = diff.clone().applyQuaternion(currentEgg.quaternion.clone().invert());
                
                const s = currentEgg.scale;
                // 💡 수직(`Y`축) 크기 조절: 부드러운 앵커링 적용
                if (dragTarget === topH) { 
                    const deltaScaleY = localDiff.y / BASE_H;
                    s.y = Math.max(0.1, startScale.y + deltaScaleY);
                    // 바닥을 앵커로 고정하고 위로 늘림
                    const moveLocalY = new THREE.Vector3(0, (s.y - startScale.y) * BASE_H / 2, 0);
                    currentEgg.position.copy(startPos).add(moveLocalY.applyQuaternion(currentEgg.quaternion));
                }
                else if (dragTarget === bottomH) { 
                    const deltaScaleY = -localDiff.y / BASE_H;
                    s.y = Math.max(0.1, startScale.y + deltaScaleY);
                    // 꼭대기를 앵커로 고정하고 아래로 늘림
                    const moveLocalY = new THREE.Vector3(0, -(s.y - startScale.y) * BASE_H / 2, 0);
                    currentEgg.position.copy(startPos).add(moveLocalY.applyQuaternion(currentEgg.quaternion));
                }
                // 수평 크기 조절 (기존 로직 유지, 오프셋 핸들 고려)
                else if (dragTarget === rightH) { s.x = Math.max(0.1, startScale.x + localDiff.x/(BASE_R*2)); currentEgg.position.copy(startPos).add(new THREE.Vector3((s.x-startScale.x)*BASE_R, 0, 0).applyQuaternion(currentEgg.quaternion)); }
                else if (dragTarget === leftH) { s.x = Math.max(0.1, startScale.x - localDiff.x/(BASE_R*2)); currentEgg.position.copy(startPos).add(new THREE.Vector3(-(s.x-startScale.x)*BASE_R, 0, 0).applyQuaternion(currentEgg.quaternion)); }
                else if (dragTarget === frontH) { s.z = Math.max(0.1, startScale.z + localDiff.z/(BASE_R*2)); currentEgg.position.copy(startPos).add(new THREE.Vector3(0, 0, (s.z-startScale.z)*BASE_R).applyQuaternion(currentEgg.quaternion)); }
                else if (dragTarget === backH) { s.z = Math.max(0.1, startScale.z - localDiff.z/(BASE_R*2)); currentEgg.position.copy(startPos).add(new THREE.Vector3(0, 0, -(s.z-startScale.z)*BASE_R).applyQuaternion(currentEgg.quaternion)); }
            }
        }
    }

    function onUp() { if (isDragging) { captureState(); isDragging = false; } dragTarget = null; controls.enabled = true; }

    function animate() {
        requestAnimationFrame(animate);
        if (currentEgg) {
            const p = currentEgg.position, s = currentEgg.scale, q = currentEgg.quaternion;
            // 💡 크기 조절 점 위치 업데이트: 물체에서 HANDLE_OFFSET 만큼 띄움
            const updateH = (h, ox, oy, oz) => {
                // 로컬 좌표에 현재 스케일과 오프셋 적용
                const localPos = new THREE.Vector3(ox * s.x, oy * s.y, oz * s.z);
                // 오프셋 방향 계산 (단위 벡터)
                const offsetDir = new THREE.Vector3(ox ? Math.sign(ox) : 0, oy ? Math.sign(oy) : 0, oz ? Math.sign(oz) : 0);
                // 로컬 위치에 오프셋 추가
                localPos.add(offsetDir.multiplyScalar(HANDLE_OFFSET));
                // 월드 좌표로 변환 후 적용
                h.position.copy(p).add(localPos.applyQuaternion(q));
            };

            updateH(topH, 0, 10, 0); updateH(bottomH, 0, -10, 0);
            updateH(rightH, 7, 0, 0); updateH(leftH, -7, 0, 0);
            updateH(frontH, 0, 0, 7); updateH(backH, 0, 0, -7);
            
            // 회전 링 업데이트 (기존 유지)
            [rotX_H, rotY_H, rotZ_H].forEach(r => { r.position.copy(p); r.quaternion.copy(q); if (r === rotX_H) r.rotateY(Math.PI/2); if (r === rotY_H) r.rotateX(Math.PI/2); });
        }
        renderer.render(scene, camera); controls.update();
    }
    window.onload = init;
</script>
</body>
</html>
