<!DOCTYPE html>
<html>

    <style>

        .btn { width: 50px; height: 50px; background: #ff69b4; border-radius: 12px; cursor: pointer; border: 2px solid #fff; margin-bottom: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }

        #container { flex-grow: 1; height: 100vh; position: relative; background: #1a1a1a; }
        #v-info { position: absolute; bottom: 15px; right: 20px; font-size: 12px; color: #666; font-family: monospace; z-index: 50; }
        #status { position: absolute; top: 15px; left: 15px; color: #0f0; font-family: monospace; font-size: 12px; pointer-events: none; z-index: 50; }
    </style>
</head>
