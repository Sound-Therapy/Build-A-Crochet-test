<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v5.40.0 - Original Engine Restored</title>
    <style>
        body { margin: 0; background-color: #ffffff; color: #111; overflow: hidden; display: flex; font-family: monospace; touch-action: none; user-select: none; }
        #panel { width: 100px; height: 100vh; background: #e0e0e0; border-right: 1px solid #ccc; display: flex; flex-direction: column; align-items: center; padding-top: 15px; z-index: 100; box-sizing: border-box; }
        .nav-group { display: flex; gap: 5px; margin-bottom: 15px; width: 85%; justify-content: center; }
        .nav-btn { flex: 1; height: 35px; cursor: pointer; background: #f5f5f5; border: 1px solid #bbb; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .nav-btn:disabled { opacity: 0.3; }
        .egg-btn { background: #ff69b4; border-radius: 50%; width: 45px; height: 55px; margin: 15px 0; cursor: pointer; border: 2px solid #fff; }
        .egg-btn.active { background: #28a745; box-shadow: 0 0 10px rgba(40,167,69,0.5); }
        #size-info { width: 85%; padding: 8px 4px; background: #f8f8f8; border: 1px solid #bbb; border-radius: 5px; font-size: 10px; margin-bottom: 15px; }
        .info-label { font-weight: bold; color: #ff69b4; border-bottom: 1px solid #ddd; margin-bottom: 4px; text-align: center; }
        .val-row { display: flex; justify-content: space-between; }
        .pattern-btn { background: #007bff; color: white; width: 85%; height: 45px; margin-top: auto; margin-bottom: 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #canvas-container { flex-grow: 1; position: relative; }
        #v-tag { position: absolute; bottom: 15px; right: 20px; color: #444; font-size: 12px; font-weight: bold; pointer-events: none; }
        /* Selection Box Style */
        #select-box { position: absolute; border: 1px solid #007bff; background: rgba(0,123,255,0.1); pointer-events: none; display: none; z-index: 50; }
    </style>
</head>
<body>

<div id="panel">
    <div class="nav-group">
        <button id="undo-btn" class="nav-btn" onclick="executeUndo()">⟲</button>
        <button id="redo-btn" class="nav-btn" onclick="executeRedo()">⟳</button>
    </div>
    <div id="egg-spawn-btn" class="egg-btn" onclick="togglePlacementMode()"></div>
    <div id="size-info">
        <div class="info-label">SIZE (cm)</div>
        <div class="val-row"><span>W:</span><span id="info-w">0.0</span></div>
        <div class="val-row"><span>H:</span><span id="info-h">0.0</span></div>
        <div class="val-row"><span>D:</span><span id="info-d">0.0</span></div>
    </div>
    <button class="pattern-btn">PATTERN</button>
</div>

<div id="canvas-container">
    <div id="select-box"></div>
    <div id="v-tag">Build-A-Crochet v5.40.0</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, currentEgg, ghostEgg;
    let isPlacementMode = false, dragTarget = null, isDragging = false, isBoxSelecting = false;
    let handles = [], rotX_H, rotY_H, rotZ_H;
    let currentSelection = [], history = [], redoStack = [];
    let startScale, startPos, startRotation, startIntersect = new THREE.Vector3(), worldAnchorPos = new THREE.Vector3();
    let boxStart = new THREE.Vector2(), boxEnd = new THREE.Vector2();
    let lastMouseAngle = 0, startHandleDist = 1;

    const BASE_H = 20, BASE_R = 7, CM_RATIO = 0.5;

    function init() {
        scene = new THREE.Scene(); scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 100) / window.innerHeight, 0.1, 1000);
        camera.position.set(60, 50, 80);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 100, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        scene.add(new THREE.GridHelper(100, 20, 0xcccccc, 0xeeeeee));
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: null };
        
        createHandles(); createGhost();
        window.addEventListener('pointerdown', onDown);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        
        captureState(); 
        animate();
    }

    // --- [5.35.0 Pure Logic Restoration] ---
    function createEgg(color, isGhost = false) {
        const points = []; for (let i = 0; i <= 20; i++) {
            const t = i / 20, y = t * BASE_H, r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((y - 10) / 10, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geo = new THREE.LatheGeometry(points, 32); geo.translate(0, -10, 0);
        geo.userData.origPos = geo.attributes.position.clone();
        const mat = new THREE.MeshLambertMaterial({ color, transparent: isGhost, opacity: isGhost ? 0.3 : 1.0 });
        const egg = new THREE.Mesh(geo, mat);
        if (!isGhost) { egg.userData.isEgg = true; egg.userData.data = { scale: new THREE.Vector3(1,1,1), offsets: Array(6).fill(0).map(()=>new THREE.Vector3()) }; }
        return egg;
    }

    function updateMesh(egg) {
        const pos = egg.geometry.attributes.position, orig = egg.geometry.userData.origPos, { scale, offsets } = egg.userData.data;
        const ctrls = [new THREE.Vector3(0,10,0), new THREE.Vector3(0,-10,0), new THREE.Vector3(-7,0,0), new THREE.Vector3(7,0,0), new THREE.Vector3(0,0,7), new THREE.Vector3(0,0,-7)];
        for (let i = 0; i < orig.count; i++) {
            const v = new THREE.Vector3(orig.getX(i), orig.getY(i), orig.getZ(i)), sV = v.clone().multiply(scale);
            let tw = 0; const sOff = new THREE.Vector3();
            for (let j = 0; j < 6; j++) {
                const w = 1 / Math.pow(v.distanceTo(ctrls[j]) + 1, 3.5); tw += w;
                sOff.add(offsets[j].clone().multiplyScalar(w));
            }
            pos.setXYZ(i, sV.x + (sOff.x/tw), sV.y + (sOff.y/tw), sV.z + (sOff.z/tw));
        }
        pos.needsUpdate = true;
    }

    function createHandles() {
        const makeH = (id) => { const m = new THREE.Mesh(new THREE.SphereGeometry(1.5,16,16), new THREE.MeshBasicMaterial({color:0xffcc00,depthTest:false})); m.renderOrder=999; m.visible=false; m.userData={isHandle:true,id}; scene.add(m); return m; };
        handles = [0,1,2,3,4,5].map(id => makeH(id));
        const makeR = (c, a) => { const r = new THREE.Mesh(new THREE.TorusGeometry(22,0.3,16,64), new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:0.4,depthTest:false})); r.renderOrder=998; r.visible=false; r.userData={isRotationHandle:true,axis:a}; scene.add(r); return r; };
        rotX_H = makeR(0xff0000,'x'); rotY_H = makeR(0x00ff00,'y'); rotZ_H = makeR(0x0000ff,'z');
    }

    function onDown(e) {
        if(e.target.tagName !== 'CANVAS') return;
        const rect = renderer.domElement.getBoundingClientRect();
        const m = new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1, -((e.clientY-rect.top)/rect.height)*2+1);
        const ray = new THREE.Raycaster(); ray.setFromCamera(m, camera);

        if(isPlacementMode) {
            const h = ray.intersectObject(scene.children.find(o=>o.type==="GridHelper"));
            if(h.length>0) spawnEgg(h[0].point); return;
        }

        const gh = ray.intersectObjects([...handles, rotX_H, rotY_H, rotZ_H]);
        if(gh.length > 0) {
            dragTarget = gh[0].object; isDragging = true; controls.enabled = false;
            const pl = new THREE.Plane(camera.getWorldDirection(new THREE.Vector3()).negate(), -dragTarget.position.dot(camera.getWorldDirection(new THREE.Vector3()).negate()));
            ray.ray.intersectPlane(pl, startIntersect);
            if(currentEgg) {
                startRotation = currentEgg.quaternion.clone(); startPos = currentEgg.position.clone(); startScale = currentEgg.userData.data.scale.clone();
                if(dragTarget.userData.isHandle){
                    const id=dragTarget.userData.id, opp=(id%2===0)?id+1:id-1;
                    const ctrls=[new THREE.Vector3(0,10,0),new THREE.Vector3(0,-10,0),new THREE.Vector3(-7,0,0),new THREE.Vector3(7,0,0),new THREE.Vector3(0,0,7),new THREE.Vector3(0,0,-7)];
                    worldAnchorPos.copy(ctrls[opp]).multiply(startScale).applyQuaternion(startRotation).add(startPos);
                    startHandleDist = startIntersect.distanceTo(worldAnchorPos);
                }
                lastMouseAngle = getMouseAngle(e, currentEgg);
            }
            return;
        }

        const eh = ray.intersectObjects(scene.children.filter(o=>o.userData.isEgg));
        if(eh.length > 0) {
            updateSelection([eh[0].object]);
            dragTarget = eh[0].object; isDragging = true; controls.enabled = false;
            const pl = new THREE.Plane(camera.getWorldDirection(new THREE.Vector3()).negate(), -dragTarget.position.dot(camera.getWorldDirection(new THREE.Vector3()).negate()));
            ray.ray.intersectPlane(pl, startIntersect);
        } else {
            isBoxSelecting = true; boxStart.set(e.clientX, e.clientY);
            const boxEl = document.getElementById('select-box');
            boxEl.style.display = 'block'; boxEl.style.left = e.clientX + 'px'; boxEl.style.top = e.clientY + 'px'; boxEl.style.width = '0px'; boxEl.style.height = '0px';
        }
    }

    function onMove(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const m = new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1, -((e.clientY-rect.top)/rect.height)*2+1);
        const ray = new THREE.Raycaster(); ray.setFromCamera(m, camera);

        if(isPlacementMode){
            const h = ray.intersectObject(scene.children.find(o=>o.type==="GridHelper"));
            if(h.length>0){ ghostEgg.visible = true; ghostEgg.position.copy(h[0].point).y += 10.01; }
            else ghostEgg.visible = false;
        }

        if(isDragging && dragTarget && currentEgg) {
            const pl = new THREE.Plane(camera.getWorldDirection(new THREE.Vector3()).negate(), -dragTarget.position.dot(camera.getWorldDirection(new THREE.Vector3()).negate()));
            let intersect = new THREE.Vector3();
            if(ray.ray.intersectPlane(pl, intersect)){
                if(dragTarget.userData.isRotationHandle){
                    const ang = getMouseAngle(e, currentEgg), da = ang - lastMouseAngle;
                    const ax = dragTarget.userData.axis==='x'?new THREE.Vector3(1,0,0):dragTarget.userData.axis==='y'?new THREE.Vector3(0,1,0):new THREE.Vector3(0,0,1);
                    currentEgg.quaternion.premultiply(new THREE.Quaternion().setFromAxisAngle(ax, -da));
                    lastMouseAngle = ang;
                } else if(dragTarget.userData.isEgg) {
                    currentEgg.position.copy(intersect);
                } else if(dragTarget.userData.isHandle) {
                    const r = Math.max(0.01, intersect.distanceTo(worldAnchorPos) / startHandleDist);
                    currentEgg.userData.data.scale.copy(startScale).multiplyScalar(r);
                    updateMesh(currentEgg);
                }
                updateUI();
            }
        }

        if(isBoxSelecting) {
            boxEnd.set(e.clientX, e.clientY);
            const boxEl = document.getElementById('select-box');
            boxEl.style.left = Math.min(boxStart.x, boxEnd.x) + 'px';
            boxEl.style.top = Math.min(boxStart.y, boxEnd.y) + 'px';
            boxEl.style.width = Math.abs(boxStart.x - boxEnd.x) + 'px';
            boxEl.style.height = Math.abs(boxStart.y - boxEnd.y) + 'px';
        }
    }

    function onUp(e) {
        if(isDragging) captureState();
        if(isBoxSelecting) {
            const boxEl = document.getElementById('select-box'); boxEl.style.display = 'none';
            isBoxSelecting = false;
            performBoxSelection();
        }
        isDragging = false; dragTarget = null; controls.enabled = true;
    }

    function performBoxSelection() {
        const rect = renderer.domElement.getBoundingClientRect();
        const xmin = (Math.min(boxStart.x, boxEnd.x) - rect.left) / rect.width * 2 - 1;
        const xmax = (Math.max(boxStart.x, boxEnd.x) - rect.left) / rect.width * 2 - 1;
        const ymin = -((Math.max(boxStart.y, boxEnd.y) - rect.top) / rect.height * 2 - 1);
        const ymax = -((Math.min(boxStart.y, boxEnd.y) - rect.top) / rect.height * 2 - 1);

        const selected = scene.children.filter(o => {
            if(!o.userData.isEgg) return false;
            const p = o.position.clone().project(camera);
            return p.x >= xmin && p.x <= xmax && p.y >= ymin && p.y <= ymax;
        });
        updateSelection(selected);
    }

    // --- [Stability: Undo/Redo without breaking Scene] ---
    function captureState() {
        const state = scene.children.filter(o=>o.userData.isEgg).map(e=>({
            pos: e.position.clone(), rot: e.quaternion.clone(), scale: e.userData.data.scale.clone(),
            offsets: e.userData.data.offsets.map(o=>o.clone()), col: e.material.color.getHex()
        }));
        const str = JSON.stringify(state);
        if(history.length > 0 && history[history.length-1] === str) return;
        history.push(str); redoStack = [];
        if(history.length > 50) history.shift();
        updateNavButtons();
    }

    window.executeUndo = () => { if(history.length < 2) return; redoStack.push(history.pop()); applyState(history[history.length-1]); };
    window.executeRedo = () => { if(redoStack.length === 0) return; const s = redoStack.pop(); history.push(s); applyState(s); };
    
    function applyState(str) {
        const data = JSON.parse(str);
        scene.children.filter(o=>o.userData.isEgg).forEach(e=> scene.remove(e));
        data.forEach(d => {
            const eg = createEgg(new THREE.Color(d.col));
            eg.position.copy(d.pos); eg.quaternion.copy(d.rot);
            eg.userData.data.scale.copy(d.scale);
            eg.userData.data.offsets = d.offsets.map(o=>new THREE.Vector3(o.x,o.y,o.z));
            updateMesh(eg); scene.add(eg);
        });
        updateSelection([]); updateNavButtons();
    }

    function updateNavButtons() {
        document.getElementById('undo-btn').disabled = history.length < 2;
        document.getElementById('redo-btn').disabled = redoStack.length === 0;
    }

    // --- [UI & Helpers] ---
    function updateSelection(sel) {
        currentSelection = sel; currentEgg = sel.length === 1 ? sel[0] : null;
        [...handles, rotX_H, rotY_H, rotZ_H].forEach(h => h.visible = !!currentEgg);
        updateUI();
    }

    function updateUI() {
        if(!currentEgg) { document.getElementById('info-w').innerText = "0.0"; return; }
        const box = new THREE.Box3().setFromObject(currentEgg); const sz = box.getSize(new THREE.Vector3());
        document.getElementById('info-w').innerText = (sz.x*CM_RATIO).toFixed(1);
        document.getElementById('info-h').innerText = (sz.y*CM_RATIO).toFixed(1);
        document.getElementById('info-d').innerText = (sz.z*CM_RATIO).toFixed(1);
    }

    function togglePlacementMode() { isPlacementMode = !isPlacementMode; document.getElementById('egg-spawn-btn').classList.toggle('active'); }
    function createGhost() { ghostEgg = createEgg(0x28a745, true); scene.add(ghostEgg); ghostEgg.visible = false; }
    function spawnEgg(p) { const eg = createEgg(0xff69b4); eg.position.copy(p).y += 10.01; scene.add(eg); captureState(); updateSelection([eg]); isPlacementMode = false; ghostEgg.visible = false; document.getElementById('egg-spawn-btn').classList.remove('active'); }
    function getMouseAngle(e, t) { const rect=renderer.domElement.getBoundingClientRect(); const sp=t.position.clone().project(camera); return Math.atan2(e.clientY-(rect.top+(1-sp.y)*rect.height/2), e.clientX-(rect.left+(1+sp.x)*rect.width/2)); }

    function animate() {
        requestAnimationFrame(animate);
        if(currentEgg){
            const {scale,offsets}=currentEgg.userData.data, p=currentEgg.position, q=currentEgg.quaternion;
            const ctrls=[new THREE.Vector3(0,10,0),new THREE.Vector3(0,-10,0),new THREE.Vector3(-7,0,0),new THREE.Vector3(7,0,0),new THREE.Vector3(0,0,7),new THREE.Vector3(0,0,-7)];
            handles.forEach((h,i)=>{
                const lP = ctrls[i].clone().multiply(scale).add(offsets[i]).add(ctrls[i].clone().normalize().multiplyScalar(7));
                h.position.copy(p).add(lP.applyQuaternion(q));
            });
            [rotX_H, rotY_H, rotZ_H].forEach(r=>{
                r.position.copy(p); r.quaternion.copy(q);
                if(r===rotX_H) r.rotateY(Math.PI/2); if(r===rotY_H) r.rotateX(Math.PI/2);
            });
        }
        renderer.render(scene, camera); controls.update();
    }
    window.onload = init;
</script>
</body>
</html>
