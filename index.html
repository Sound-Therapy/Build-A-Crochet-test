<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v5.6.8</title>
    <style>
        body { margin: 0; background-color: #111; color: #0f0; overflow: hidden; display: flex; font-family: monospace; touch-action: none; }
        #panel { width: 80px; height: 100vh; background: #222; border-right: 1px solid #444; display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100; }
        .btn { width: 50px; height: 50px; background: #ff69b4; border: 2px solid #fff; border-radius: 10px; cursor: pointer; }
        #canvas-container { flex-grow: 1; position: relative; background: #000; }
        #v-tag { position: absolute; bottom: 15px; right: 20px; color: #666; font-size: 12px; font-weight: bold; z-index: 200; }
    </style>
</head>
<body>

<div id="panel">
    <button class="btn" onclick="handleSpawn()"></button>
    <div style="font-size: 10px; margin-top: 5px; color: #ccc;">ADD EGG</div>
</div>

<div id="canvas-container">
    <div id="v-tag">Build-A-Crochet Engine v5.6.8</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, egg, frontH;
    let dragTarget = null;
    let plane = new THREE.Plane();
    let planeIntersect = new THREE.Vector3();
    let dragStartOffset = new THREE.Vector3();
    
    const BASE_H = 20, BASE_R = 7;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 80) / window.innerHeight, 0.1, 1000);
        camera.position.set(40, 30, 60); // 핸들이 잘 보이도록 약간 대각선 뷰

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 80, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(100, 20, 0x444444, 0x222222));
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        window.addEventListener('pointerdown', onDown);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        
        animate();
    }

    window.handleSpawn = function() {
        if (egg) return;
        const points = [];
        for (let i = 0; i <= 20; i++) {
            const t = i / 20;
            const y = t * BASE_H;
            const r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((y - 10) / 10, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geo = new THREE.LatheGeometry(points, 32);
        
        // Z축 조작을 위해 Pivot을 뒷면(-BASE_R)에 고정
        geo.translate(0, 0, BASE_R); 
        
        const mat = new THREE.MeshPhongMaterial({ color: 0xff69b4, wireframe: true, transparent: true, opacity: 0.8 });
        egg = new THREE.Mesh(geo, mat);
        egg.position.set(0, 0, -BASE_R); // 그리드 중심 정렬
        scene.add(egg);

        const hGeo = new THREE.SphereGeometry(1.5, 16, 16);
        frontH = new THREE.Mesh(hGeo, new THREE.MeshBasicMaterial({ color: 0xffff00 })); // Yellow
        frontH.visible = true;
        scene.add(frontH);
    };

    function onDown(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);

        if (frontH && raycaster.intersectObject(frontH).length > 0) {
            dragTarget = frontH;
            controls.enabled = false;

            // 바닥 평면(XZ) 기준으로 전후 조작 계산
            plane.setFromNormalAndCoplanarPoint(new THREE.Vector3(0, 1, 0), dragTarget.position);
            raycaster.ray.intersectPlane(plane, planeIntersect);
            dragStartOffset.copy(planeIntersect).sub(dragTarget.position);
        }
    }

    function onMove(e) {
        if (!dragTarget || !egg) return;
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);

        if (raycaster.ray.intersectPlane(plane, planeIntersect)) {
            const targetPos = planeIntersect.sub(dragStartOffset);
            
            // 뒷면 고정 기준, 앞쪽으로의 거리 계산
            const backEdgeZ = egg.position.z;
            const currentDepth = targetPos.z - backEdgeZ;
            
            // 스케일 적용 (최소 0.1)
            egg.scale.z = Math.max(0.1, currentDepth / (BASE_R * 2));
        }
    }

    function onUp() {
        dragTarget = null;
        controls.enabled = true;
    }

    function animate() {
        requestAnimationFrame(animate);
        if (egg && frontH) {
            const curZ = (BASE_R * 2) * egg.scale.z;
            const backZ = egg.position.z;
            // 노란 점을 에그의 앞면 끝에 동기화
            frontH.position.set(egg.position.x, egg.position.y + 10, backZ + curZ);
        }
        renderer.render(scene, camera);
        controls.update();
    }

    window.onload = init;
</script>
</body>
</html>
