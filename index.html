<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build-A-Crochet v5.3.0</title>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #ffffff; touch-action: none; display: flex; }
        #item-panel {
            width: 80px; height: 100vh; background: #f9f9f9; border-right: 2px solid #ff69b4;
            display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 1000;
        }
        .item-box {
            width: 50px; height: 50px; background: #fff; border: 2px dashed #ccc; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 15px;
        }
        .sphere-icon { width: 30px; height: 30px; background: #ff69b4; border-radius: 50%; }
        .item-label { font-size: 9px; color: #ff69b4; font-weight: bold; }
        #canvas-container { flex-grow: 1; height: 100vh; position: relative; }
        #v-info { position: absolute; bottom: 10px; right: 10px; font-size: 9px; color: #ddd; }
    </style>
</head>
<body>

<div id="item-panel">
    <div class="item-label">LIBRARY</div>
    <div class="item-box" onclick="addBody()">
        <div class="sphere-icon"></div>
    </div>
    <div class="item-label">BODY (Egg)</div>
</div>

<div id="canvas-container">
    <div id="v-info">v5.3.0 (Interactive Selection)</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, mainEgg;
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();
    let handles = [];

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 80) / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 30, 60);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 80, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        let light = new THREE.PointLight(0xffffff, 1);
        light.position.set(20, 30, 20);
        scene.add(light);
        scene.add(new THREE.GridHelper(100, 20, 0xeeeeee, 0xf5f5f5));
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        
        // 클릭 이벤트 리스너 등록
        window.addEventListener('pointerdown', onPointerDown);
        
        animate();
    }

    window.addBody = function() {
        if (mainEgg) return;

        const points = [];
        for (let i = 0; i <= 20; i++) {
            const t = i / 20;
            const y = (t - 0.5) * 26;
            const r = (13.5 / 2) * Math.sqrt(Math.max(0, 1 - Math.pow(y / 13, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geometry = new THREE.LatheGeometry(points, 32);
        const material = new THREE.MeshPhongMaterial({ color: 0xff69b4, wireframe: true });
        mainEgg = new THREE.Mesh(geometry, material);
        scene.add(mainEgg);

        // 조절점(Handles) 생성
        createHandles();
        setHandlesVisible(false); // 처음엔 숨김
    }

    function createHandles() {
        const handleGeo = new THREE.SphereGeometry(0.8, 16, 16);
        const handleMat = new THREE.MeshBasicMaterial({ color: 0x007bff }); // 파란색 점

        const positions = [
            [0, 15, 0],  // 위
            [0, -15, 0], // 아래
            [8, 0, 0],   // 우
            [-8, 0, 0]   // 좌
        ];

        positions.forEach(pos => {
            const h = new THREE.Mesh(handleGeo, handleMat);
            h.position.set(...pos);
            mainEgg.add(h); // 에그의 자식으로 등록 (에그 움직이면 같이 움직임)
            handles.push(h);
        });
    }

    function setHandlesVisible(visible) {
        handles.forEach(h => h.visible = visible);
    }

    function onPointerDown(event) {
        // 마우스 좌표를 -1 ~ 1 사이로 변환 (Canvas 영역 기준)
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(mainEgg);

        if (intersects.length > 0) {
            setHandlesVisible(true); // 에그 클릭 시 보임
            controls.enabled = false; // 조작 시 화면 회전 잠시 멈춤 (나중을 위해)
            setTimeout(() => controls.enabled = true, 100);
        } else {
            setHandlesVisible(false); // 빈 공간 클릭 시 숨김
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        if(controls) controls.update();
        renderer.render(scene, camera);
    }

    window.onload = init;
</script>
</body>
</html>
