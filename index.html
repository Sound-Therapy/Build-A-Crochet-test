<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v5.7.0</title>
    <style>
        body { margin: 0; background-color: #111; color: #0f0; overflow: hidden; display: flex; font-family: monospace; touch-action: none; }
        #panel { width: 80px; height: 100vh; background: #222; border-right: 1px solid #444; display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100; }
        .btn { width: 50px; height: 50px; background: #ff69b4; border: 2px solid #fff; border-radius: 10px; cursor: pointer; }
        #canvas-container { flex-grow: 1; position: relative; background: #000; }
        #v-tag { position: absolute; bottom: 15px; right: 20px; color: #666; font-size: 12px; font-weight: bold; z-index: 200; }
    </style>
</head>
<body>

<div id="panel">
    <button class="btn" onclick="handleSpawn()"></button>
    <div style="font-size: 10px; margin-top: 5px; color: #ccc;">ADD EGG</div>
</div>

<div id="canvas-container">
    <div id="v-tag">Build-A-Crochet Engine v5.7.0</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, egg;
    let topH, bottomH, moveH, rightH, leftH, frontH, backH;
    let dragTarget = null;
    let plane = new THREE.Plane();
    let planeIntersect = new THREE.Vector3();
    let dragStartOffset = new THREE.Vector3();
    
    const BASE_H = 20, BASE_R = 7;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 80) / window.innerHeight, 0.1, 1000);
        camera.position.set(50, 40, 70);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 80, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(100, 20, 0x444444, 0x222222));
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        window.addEventListener('pointerdown', onDown);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        animate();
    }

    window.handleSpawn = function() {
        if (egg) return;
        const points = [];
        for (let i = 0; i <= 20; i++) {
            const t = i / 20;
            const y = t * BASE_H;
            const r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((y - 10) / 10, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geo = new THREE.LatheGeometry(points, 32);
        geo.translate(BASE_R, 0, BASE_R); // Pivot 설정
        
        const mat = new THREE.MeshPhongMaterial({ color: 0xff69b4, wireframe: true, transparent: true, opacity: 0.8 });
        egg = new THREE.Mesh(geo, mat);
        egg.position.set(-BASE_R, 0, -BASE_R);
        scene.add(egg);

        const hGeo = new THREE.SphereGeometry(1.2, 16, 16);
        const makeH = (col) => {
            const m = new THREE.Mesh(hGeo, new THREE.MeshBasicMaterial({ color: col }));
            m.visible = false;
            scene.add(m);
            return m;
        };

        topH = makeH(0x007bff);    // 상
        bottomH = makeH(0x00d4ff); // 하
        moveH = makeH(0x28a745);   // 이동
        rightH = makeH(0x0056b3);  // 우
        leftH = makeH(0x00ffff);   // 좌
        frontH = makeH(0xffff00);  // 전 (노란색)
        backH = makeH(0xffa500);   // 후 (주황색)
    };

    function onDown(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);

        const targets = [topH, bottomH, moveH, rightH, leftH, frontH, backH, egg];
        const hits = raycaster.intersectObjects(targets.filter(o => o && (o.visible || o === egg)));
        
        if (hits.length > 0) {
            const obj = hits[0].object;
            if (obj === egg) {
                [topH, bottomH, moveH, rightH, leftH, frontH, backH].forEach(h => h.visible = true);
            } else {
                dragTarget = obj;
                controls.enabled = false;
                const normal = (dragTarget === topH || dragTarget === bottomH || dragTarget === moveH) ? new THREE.Vector3(0, 0, 1) : new THREE.Vector3(0, 1, 0);
                plane.setFromNormalAndCoplanarPoint(normal, dragTarget.position);
                raycaster.ray.intersectPlane(plane, planeIntersect);
                dragStartOffset.copy(planeIntersect).sub(dragTarget.position);
            }
        } else {
            [topH, bottomH, moveH, rightH, leftH, frontH, backH].forEach(h => h.visible = false);
        }
    }

    function onMove(e) {
        if (!dragTarget || !egg) return;
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);

        if (raycaster.ray.intersectPlane(plane, planeIntersect)) {
            const pos = planeIntersect.sub(dragStartOffset);
            
            if (dragTarget === moveH) {
                egg.position.y = pos.y - (BASE_H * egg.scale.y + 4);
            } else if (dragTarget === topH) {
                egg.scale.y = Math.max(0.1, (pos.y - egg.position.y) / BASE_H);
            } else if (dragTarget === bottomH) {
                const oldTopY = egg.position.y + (BASE_H * egg.scale.y);
                egg.position.y = pos.y;
                egg.scale.y = Math.max(0.1, (oldTopY - pos.y) / BASE_H);
            } else if (dragTarget === rightH) {
                egg.scale.x = Math.max(0.1, (pos.x - egg.position.x) / (BASE_R * 2));
            } else if (dragTarget === leftH) {
                const oldRightX = egg.position.x + (BASE_R * 2 * egg.scale.x);
                egg.position.x = pos.x;
                egg.scale.x = Math.max(0.1, (oldRightX - pos.x) / (BASE_R * 2));
            } else if (dragTarget === frontH) {
                egg.scale.z = Math.max(0.1, (pos.z - egg.position.z) / (BASE_R * 2));
            } else if (dragTarget === backH) {
                const oldFrontZ = egg.position.z + (BASE_R * 2 * egg.scale.z);
                egg.position.z = pos.z;
                egg.scale.z = Math.max(0.1, (oldFrontZ - pos.z) / (BASE_R * 2));
            }
        }
    }

    function onUp() { dragTarget = null; controls.enabled = true; }

    function animate() {
        requestAnimationFrame(animate);
        if (egg && topH) {
            const curH = BASE_H * egg.scale.y, curW = (BASE_R * 2) * egg.scale.x, curD = (BASE_R * 2) * egg.scale.z;
            const bY = egg.position.y, tY = bY + curH, lX = egg.position.x, bZ = egg.position.z;
            const midX = lX + curW/2, midZ = bZ + curD/2;

            topH.position.set(midX, tY, midZ);
            moveH.position.set(midX, tY + 4, midZ);
            bottomH.position.set(midX, bY, midZ);
            rightH.position.set(lX + curW, bY + curH/2, midZ);
            leftH.position.set(lX, bY + curH/2, midZ);
            frontH.position.set(midX, bY + curH/2, bZ + curD);
            backH.position.set(midX, bY + curH/2, bZ);
        }
        renderer.render(scene, camera);
        controls.update();
    }
    window.onload = init;
</script>
</body>
</html>
