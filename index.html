<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v5.27.1</title>
    <style>
        body { margin: 0; background-color: #ffffff; color: #111; overflow: hidden; display: flex; font-family: monospace; touch-action: none; user-select: none; }
        #panel { width: 80px; height: 100vh; background: #e0e0e0; border-right: 1px solid #ccc; display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100; }
        .btn { width: 50px; height: 50px; cursor: pointer; border: 2px solid #fff; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; border-radius: 8px; background: #eee; }
        .egg-btn { background: #ff69b4; border-radius: 50%; width: 40px; height: 50px; }
        .egg-btn.active { background: #28a745; box-shadow: 0 0 20px rgba(40,167,69,0.5); }
        .undo-btn { background: #333; color: white; }
        #canvas-container { flex-grow: 1; position: relative; background: #fff; }
        #v-tag { position: absolute; bottom: 15px; right: 20px; color: #444; font-size: 12px; font-weight: bold; pointer-events: none; }
        #palette { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 12px; display: none; grid-template-columns: 1fr; gap: 8px; border: 1px solid #ccc; z-index: 200; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(0,0,0,0.1); }
        #select-box { border: 2px dashed #ff69b4; background-color: rgba(255, 105, 180, 0.1); position: absolute; pointer-events: none; display: none; z-index: 300; }
    </style>
</head>
<body>

<div id="panel">
    <div class="btn undo-btn" onclick="executeUndo()">UNDO</div>
    <div id="egg-spawn-btn" class="btn egg-btn" onclick="togglePlacementMode()"></div>
</div>

<div id="canvas-container">
    <div id="v-tag">Build-A-Crochet Engine v5.27.1</div>
    <div id="palette">
        <div class="color-dot" style="background: #ff69b4;" onclick="updateColor('#ff69b4')"></div>
        <div class="color-dot" style="background: #ffffff;" onclick="updateColor('#ffffff')"></div>
        <div class="color-dot" style="background: #000000;" onclick="updateColor('#000000')"></div>
    </div>
    <div id="select-box"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, currentEgg, ghostEgg;
    let isPlacementMode = false, dragTarget = null, isDragging = false;
    let rotX_H, rotY_H, rotZ_H, handles = [];
    let startScale, startPos, startRotation, mouseButton, startOffset, startMouseAngle, isCtrlPressed = false;

    let isBoxSelecting = false, boxStart = new THREE.Vector2();
    let selectBoxEl = document.getElementById('select-box');

    let history = [];
    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const BASE_H = 20, BASE_R = 7, H_OFFSET = 7, SENSITIVITY = 0.7;

    function init() {
        scene = new THREE.Scene(); scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 80) / window.innerHeight, 0.1, 1000);
        camera.position.set(60, 50, 80);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 80, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

        scene.add(new THREE.GridHelper(100, 20, 0xcccccc, 0xeeeeee));
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6); dirLight.position.set(10, 20, 10); scene.add(dirLight);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: null };

        createHandles();
        createGhost();
        
        window.addEventListener('pointerdown', onDown);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        
        // 키보드 이벤트 리스너 추가 (Ctrl 감지)
        window.addEventListener('keydown', (e) => { if(e.ctrlKey || e.key === 'Control') isCtrlPressed = true; });
        window.addEventListener('keyup', (e) => { if(!e.ctrlKey && e.key === 'Control') isCtrlPressed = false; });
        
        captureState();
        animate();
    }

    function createEgg(color, isGhost = false) {
        const points = []; for (let i = 0; i <= 20; i++) {
            const t = i / 20, y = t * BASE_H, r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((y - 10) / 10, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geo = new THREE.LatheGeometry(points, 32); geo.translate(0, -10, 0);
        geo.userData.origPos = geo.attributes.position.clone();
        const mat = new THREE.MeshPhongMaterial({ color, wireframe: true, transparent: true, opacity: isGhost ? 0.3 : 0.8 });
        const egg = new THREE.Mesh(geo, mat);
        if (!isGhost) {
            egg.userData.isEgg = true;
            egg.userData.data = { scale: new THREE.Vector3(1, 1, 1), offsets: Array.from({length: 6}, () => new THREE.Vector3()) };
            const outline = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide }));
            outline.scale.set(1.02, 1.02, 1.02); egg.add(outline);
            egg.userData.outline = outline;
        }
        return egg;
    }

    function updateMesh(egg) {
        if(!egg || !egg.geometry) return;
        const pos = egg.geometry.attributes.position, orig = egg.geometry.userData.origPos;
        const { scale, offsets } = egg.userData.data;
        const ctrls = [new THREE.Vector3(0,10,0), new THREE.Vector3(0,-10,0), new THREE.Vector3(-7,0,0), new THREE.Vector3(7,0,0), new THREE.Vector3(0,0,7), new THREE.Vector3(0,0,-7)];
        for (let i = 0; i < orig.count; i++) {
            const v = new THREE.Vector3(orig.getX(i), orig.getY(i), orig.getZ(i)), sV = v.clone().multiply(scale);
            let tw = 0; const sOff = new THREE.Vector3();
            for (let j = 0; j < 6; j++) {
                const w = 1 / Math.pow(v.distanceTo(ctrls[j]) + 1, 3.5); tw += w;
                sOff.add(offsets[j].clone().multiplyScalar(w));
            }
            const fV = sV.add(sOff.divideScalar(tw));
            pos.setXYZ(i, fV.x, fV.y, fV.z);
        }
        pos.needsUpdate = true;
        egg.userData.outline.geometry.attributes.position.copy(pos).needsUpdate = true;
    }

    function createHandles() {
        const makeH = (id) => {
            const m = new THREE.Mesh(new THREE.SphereGeometry(1.5, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffcc00, depthTest: false }));
            m.renderOrder = 999; m.visible = false; m.userData = { isHandle: true, id };
            scene.add(m); return m;
        };
        handles = [0,1,2,3,4,5].map(id => makeH(id));
        const makeR = (col, axis) => {
            const r = new THREE.Mesh(new THREE.TorusGeometry(22, 0.4, 16, 64), new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.5, depthTest: false }));
            r.renderOrder = 998; r.visible = false; r.userData = { isRotationHandle: true, axis }; scene.add(r); return r;
        };
        rotX_H = makeR(0xff0000, 'x'); rotY_H = makeR(0x00ff00, 'y'); rotZ_H = makeR(0x0000ff, 'z');
    }

    function onDown(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster(); raycaster.setFromCamera(mouse, camera);

        if (isPlacementMode && e.button === 0) {
            let intersect = new THREE.Vector3(); if (raycaster.ray.intersectPlane(groundPlane, intersect)) spawnEgg(intersect); return;
        }

        const hits = raycaster.intersectObjects([...handles, rotX_H, rotY_H, rotZ_H, ...scene.children.filter(o => o.userData.isEgg)]);
        
        if (e.button === 2) {
            if (hits.length === 0) {
                isBoxSelecting = true; boxStart.set(e.clientX, e.clientY);
                selectBoxEl.style.display = 'block'; selectBoxEl.style.width = '0px'; selectBoxEl.style.height = '0px';
                return;
            }
        }

        if (hits.length > 0) {
            dragTarget = hits[0].object; controls.enabled = false; isDragging = true; mouseButton = e.button;
            if (dragTarget.userData.isEgg) {
                currentEgg = dragTarget;
                [...handles, rotX_H, rotY_H, rotZ_H].forEach(h => h.visible = true);
                document.getElementById('palette').style.display = 'grid';
            }
            startRotation = currentEgg.quaternion.clone(); startPos = currentEgg.position.clone(); 
            startScale = currentEgg.userData.data.scale.clone();
            const camNormal = camera.getWorldDirection(new THREE.Vector3()).negate();
            const plane = new THREE.Plane(camNormal, -dragTarget.getWorldPosition(new THREE.Vector3()).dot(camNormal));
            let intersect = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, intersect)) startOffset = intersect.clone().sub(startPos);
            const sPos = dragTarget.getWorldPosition(new THREE.Vector3()).project(camera);
            startMouseAngle = Math.atan2(e.clientY - (rect.top + (1 - sPos.y) * rect.height / 2), e.clientX - (rect.left + (1 + sPos.x) * rect.width / 2));
        } else if (e.button === 0) {
            currentEgg = null; [...handles, rotX_H, rotY_H, rotZ_H].forEach(h => h.visible = false);
            document.getElementById('palette').style.display = 'none';
        }
    }

    function onMove(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster(); raycaster.setFromCamera(mouse, camera);

        // 💡 1번 오류 해결: 배치 모드일 때 Ghost Egg가 마우스를 따라가도록 수정
        if (isPlacementMode) {
            let intersect = new THREE.Vector3(); 
            if (raycaster.ray.intersectPlane(groundPlane, intersect)) { 
                ghostEgg.position.copy(intersect).y += 10; 
                ghostEgg.visible = true; 
            } else {
                ghostEgg.visible = false;
            }
            return; 
        }

        if (isBoxSelecting) {
            const x = Math.min(boxStart.x, e.clientX); const y = Math.min(boxStart.y, e.clientY);
            const w = Math.abs(e.clientX - boxStart.x); const h = Math.abs(e.clientY - boxStart.y);
            selectBoxEl.style.left = x + 'px'; selectBoxEl.style.top = y + 'px';
            selectBoxEl.style.width = w + 'px'; selectBoxEl.style.height = h + 'px';
            return;
        }

        if (!dragTarget || !isDragging) return;

        const camNormal = camera.getWorldDirection(new THREE.Vector3()).negate();
        const plane = new THREE.Plane(camNormal, -dragTarget.getWorldPosition(new THREE.Vector3()).dot(camNormal));
        let intersect = new THREE.Vector3();
        if (raycaster.ray.intersectPlane(plane, intersect)) {
            if (dragTarget.userData.isEgg) {
                currentEgg.position.copy(intersect.sub(startOffset));
            } else if (dragTarget.userData.isRotationHandle) {
                const sPos = currentEgg.position.clone().project(camera);
                const angle = Math.atan2(e.clientY - (rect.top + (1 - sPos.y) * rect.height / 2), e.clientX - (rect.left + (1 + sPos.x) * rect.width / 2));
                const axis = new THREE.Vector3(dragTarget.userData.axis === 'x' ? 1 : 0, dragTarget.userData.axis === 'y' ? 1 : 0, dragTarget.userData.axis === 'z' ? 1 : 0);
                currentEgg.quaternion.multiplyQuaternions(startRotation, new THREE.Quaternion().setFromAxisAngle(axis, -(angle - startMouseAngle)));
            } else if (dragTarget.userData.isHandle) {
                const localDiff = intersect.sub(dragTarget.getWorldPosition(new THREE.Vector3())).applyQuaternion(currentEgg.quaternion.clone().invert());
                const id = dragTarget.userData.id, data = currentEgg.userData.data;
                
                // 💡 2번 오류 해결: useFreeForm 판별 시 isCtrlPressed 감지 강화
                const useFreeForm = (mouseButton === 2 || (mouseButton === 0 && isCtrlPressed));

                if (useFreeForm) {
                    if (id < 2) { 
                        const dir = id === 0 ? 1 : -1; const ds = (localDiff.y * dir / BASE_H) * SENSITIVITY; data.scale.y = Math.max(0.1, startScale.y + ds);
                        currentEgg.position.copy(startPos).add(new THREE.Vector3(0, (data.scale.y - startScale.y) * BASE_H / 2 * dir, 0).applyQuaternion(currentEgg.quaternion));
                    } else if (id < 4) {
                        const dir = id === 3 ? 1 : -1; const ds = (localDiff.x * dir / (BASE_R * 2)) * SENSITIVITY; data.scale.x = Math.max(0.1, startScale.x + ds);
                        currentEgg.position.copy(startPos).add(new THREE.Vector3((data.scale.x - startScale.x) * BASE_R * dir, 0, 0).applyQuaternion(currentEgg.quaternion));
                    } else {
                        const dir = id === 4 ? 1 : -1; const ds = (localDiff.z * dir / (BASE_R * 2)) * SENSITIVITY; data.scale.z = Math.max(0.1, startScale.z + ds);
                        currentEgg.position.copy(startPos).add(new THREE.Vector3(0, 0, (data.scale.z - startScale.z) * BASE_R * dir).applyQuaternion(currentEgg.quaternion));
                    }
                } else {
                    let ds = 0;
                    if (id < 2) ds = (localDiff.y * (id === 0 ? 1 : -1) / BASE_H) * SENSITIVITY;
                    else if (id < 4) ds = (localDiff.x * (id === 3 ? 1 : -1) / (BASE_R * 2)) * SENSITIVITY;
                    else ds = (localDiff.z * (id === 4 ? 1 : -1) / (BASE_R * 2)) * SENSITIVITY;
                    data.scale.setScalar(Math.max(0.1, startScale.y + ds));
                    const moveDir = id < 2 ? new THREE.Vector3(0, (id === 0 ? 1 : -1), 0) : (id < 4 ? new THREE.Vector3((id === 3 ? 1 : -1), 0, 0) : new THREE.Vector3(0, 0, (id === 4 ? 1 : -1)));
                    const moveDist = id < 2 ? (data.scale.y - startScale.y) * BASE_H / 2 : (data.scale.x - startScale.x) * BASE_R;
                    currentEgg.position.copy(startPos).add(moveDir.applyQuaternion(currentEgg.quaternion).multiplyScalar(moveDist));
                }
                updateMesh(currentEgg);
            }
        }
    }

    function onUp() {
        if (isBoxSelecting) { isBoxSelecting = false; selectBoxEl.style.display = 'none'; }
        if (isDragging) captureState();
        isDragging = false; dragTarget = null; controls.enabled = true;
    }

    function createGhost() { ghostEgg = createEgg(0x28a745, true); ghostEgg.visible = false; scene.add(ghostEgg); }

    function captureState() {
        const state = scene.children.filter(o => o.userData.isEgg).map(e => ({
            pos: e.position.clone(), rot: e.quaternion.clone(),
            scale: e.userData.data.scale.clone(), offsets: e.userData.data.offsets.map(o => o.clone()), col: e.material.color.getHex()
        }));
        history.push(JSON.stringify(state)); if (history.length > 30) history.shift();
    }

    window.executeUndo = function() {
        if (history.length < 2) return; 
        history.pop(); const state = JSON.parse(history[history.length - 1]);
        scene.children.filter(o => o.userData.isEgg).forEach(e => { scene.remove(e); if(e.geometry) e.geometry.dispose(); if(e.material) e.material.dispose(); });
        state.forEach(d => {
            const e = createEgg(new THREE.Color(d.col)); e.position.set(d.pos.x, d.pos.y, d.pos.z);
            e.quaternion.set(d.rot._x, d.rot._y, d.rot._z, d.rot._w);
            e.userData.data = { scale: new THREE.Vector3(d.scale.x, d.scale.y, d.scale.z), offsets: d.offsets.map(o => new THREE.Vector3(o.x, o.y, o.z)) };
            updateMesh(e); scene.add(e);
        });
        currentEgg = null; [...handles, rotX_H, rotY_H, rotZ_H].forEach(h => h.visible = false);
    };

    function togglePlacementMode() { isPlacementMode = !isPlacementMode; ghostEgg.visible = isPlacementMode; document.getElementById('egg-spawn-btn').classList.toggle('active', isPlacementMode); }
    function spawnEgg(pos) { 
        const e = createEgg(0xff69b4); e.position.copy(pos).y += 10; scene.add(e); 
        setTimeout(() => { captureState(); currentEgg = e; [...handles, rotX_H, rotY_H, rotZ_H].forEach(h => h.visible = true); document.getElementById('palette').style.display = 'grid'; }, 50); togglePlacementMode(); 
    }

    function animate() {
        requestAnimationFrame(animate);
        if (currentEgg && currentEgg.visible) {
            const { scale, offsets } = currentEgg.userData.data, p = currentEgg.position, q = currentEgg.quaternion;
            const ctrls = [new THREE.Vector3(0,10,0), new THREE.Vector3(0,-10,0), new THREE.Vector3(-7,0,0), new THREE.Vector3(7,0,0), new THREE.Vector3(0,0,7), new THREE.Vector3(0,0,-7)];
            handles.forEach((h, i) => h.position.copy(p).add(ctrls[i].clone().multiply(scale).add(offsets[i]).add(ctrls[i].clone().normalize().multiplyScalar(H_OFFSET)).applyQuaternion(q)));
            [rotX_H, rotY_H, rotZ_H].forEach(r => { r.position.copy(p); r.quaternion.copy(q); if(r===rotX_H) r.rotateY(Math.PI/2); if(r===rotY_H) r.rotateX(Math.PI/2); r.visible = true; });
        }
        renderer.render(scene, camera); controls.update();
    }
    window.onload = init; window.updateColor = (c) => { if(currentEgg) { currentEgg.material.color.set(c); captureState(); } };
</script>
</body>
</html>
