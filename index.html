<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build-A-Crochet v5.4.9</title>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #ffffff; touch-action: none; display: flex; }
        #item-panel {
            width: 80px; height: 100vh; background: #f9f9f9; border-right: 2px solid #ff69b4;
            display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 2000;
        }
        .item-box {
            width: 50px; height: 50px; background: #fff; border: 2px solid #ff69b4; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 15px;
            position: relative;
        }
        .sphere-icon { width: 30px; height: 30px; background: #ff69b4; border-radius: 50%; pointer-events: none; }
        .item-label { font-size: 9px; color: #ff69b4; font-weight: bold; pointer-events: none; }
        #canvas-container { flex-grow: 1; height: 100vh; position: relative; z-index: 1000; }
        #v-info { position: absolute; bottom: 10px; right: 10px; font-size: 9px; color: #ddd; }
    </style>
</head>
<body>

<div id="item-panel">
    <div class="item-label">LIBRARY</div>
    <div class="item-box" onclick="addBody(event)">
        <div class="sphere-icon"></div>
    </div>
    <div class="item-label">BODY (Egg)</div>
</div>

<div id="canvas-container">
    <div id="v-info">v5.4.9 (Safe Button)</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, mainEgg;
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();
    let topHandle = null;
    let isDragging = false;
    let prevMouseY = 0;
    const INITIAL_HEIGHT = 26;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 80) / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 30, 60);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 80, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        let light = new THREE.DirectionalLight(0xffffff, 0.6);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.GridHelper(100, 20, 0xeeeeee, 0xf5f5f5));
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        
        // 캔버스 이벤트
        window.addEventListener('pointerdown', onPointerDown);
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', onPointerUp);
        
        animate();
    }

    // 전역 함수로 선언하여 HTML onclick에서 접근 가능하게 함
    window.addBody = function(event) {
        if (event) event.stopPropagation(); // 버튼 클릭이 배경으로 전달되는 것 방지
        if (mainEgg) return;

        const points = [];
        const radius = 13.5 / 2;
        for (let i = 0; i <= 20; i++) {
            const t = i / 20;
            const y = t * INITIAL_HEIGHT; 
            const r = radius * Math.sqrt(Math.max(0, 1 - Math.pow((y - 13) / 13, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        
        const geometry = new THREE.LatheGeometry(points, 32);
        const material = new THREE.MeshPhongMaterial({ color: 0xff69b4, wireframe: true });
        mainEgg = new THREE.Mesh(geometry, material);
        scene.add(mainEgg);

        const handleGeo = new THREE.SphereGeometry(1.2, 16, 16);
        const handleMat = new THREE.MeshBasicMaterial({ color: 0x007bff });
        topHandle = new THREE.Mesh(handleGeo, handleMat);
        topHandle.visible = false;
        scene.add(topHandle);
    }

    function onPointerDown(event) {
        updateMouseCoords(event);
        raycaster.setFromCamera(mouse, camera);

        if (topHandle && topHandle.visible) {
            const intersects = raycaster.intersectObject(topHandle);
            if (intersects.length > 0) {
                isDragging = true;
                topHandle.material.color.set(0xffff00);
                controls.enabled = false;
                prevMouseY = event.clientY;
                return;
            }
        }

        if (mainEgg) {
            const intersects = raycaster.intersectObject(mainEgg);
            if (intersects.length > 0) {
                topHandle.visible = true;
            } else {
                topHandle.visible = false;
            }
        }
    }

    function onPointerMove(event) {
        if (!isDragging || !mainEgg) return;

        const deltaY = (prevMouseY - event.clientY) * 0.01;
        prevMouseY = event.clientY;
        mainEgg.scale.y = Math.max(0.1, mainEgg.scale.y + deltaY);
    }

    function onPointerUp() {
        if (isDragging) {
            if (topHandle) topHandle.material.color.set(0x007bff);
            isDragging = false;
            controls.enabled = true;
        }
    }

    function updateMouseCoords(event) {
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function animate() {
        requestAnimationFrame(animate);
        if (mainEgg && topHandle) {
            topHandle.position.set(0, INITIAL_HEIGHT * mainEgg.scale.y, 0);
        }
        if(controls) controls.update();
        renderer.render(scene, camera);
    }

    window.onload = init;
</script>
</body>
</html>
